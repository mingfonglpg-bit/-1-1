name: Sync Google Sheets to GitHub

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

# 新增這段權限宣告，確保有寫入權限
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download Google Sheet as XLSX
        run: |
          curl -L "https://docs.google.com/spreadsheets/d/1s02PdAHvWPDRT-qjqmt66eALZ_5r4tjhZ7yqBbNegLw/export?format=xlsx&gid=159940576" -o 擴充凍庫.xlsx

      - name: Commit and Push to root
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add 擴充凍庫.xlsx
          # 檢查是否有實際變更，避免無異動時報錯
          git diff --quiet && git diff --staged --quiet || (git commit -m "更新: 每日自動同步擴充凍庫資料" && git push)
