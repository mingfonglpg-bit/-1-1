name: Sync Google Sheets to GitHub

on:
  workflow_dispatch: # 允許在 GitHub 介面手動觸發
  schedule:
    - cron: '0 0 * * *' # 每天凌晨 00:00 自動執行

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download Google Sheet as XLSX
        run: |
          # 透過匯出連結下載檔案
          curl -L "https://docs.google.com/spreadsheets/d/1s02PdAHvWPDRT-qjqmt66eALZ_5r4tjhZ7yqBbNegLw/export?format=xlsx" -o 擴充凍庫.xlsx

      - name: Commit and Push to root
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add 擴充凍庫.xlsx
          # 檢查是否有變更，若有則提交
          git diff --quiet && git diff --staged --quiet || (git commit -m "更新: 每日自動同步擴充凍庫資料" && git push)
