name: Sync Google Sheets to GitHub

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *' # 每天凌晨 00:00 自動執行
    - cron: '0 0 * * *'  # 台灣時間 08:00 (UTC 00:00)
    - cron: '0 5 * * *'  # 台灣時間 13:00 (UTC 05:00)
    - cron: '6 13 * * *' # 台灣時間 21:00 (UTC 13:00)
# 設定權限以允許 GitHub Actions 推送代碼
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Google Sheet as XLSX
        run: |
          # 使用 curl 下載指定分頁 (Inventory) 並存為 擴充凍庫.xlsx
          curl -L "https://docs.google.com/spreadsheets/d/1s02PdAHvWPDRT-qjqmt66eALZ_5r4tjhZ7yqBbNegLw/export?format=xlsx&gid=159940576" -o 擴充凍庫.xlsx

      - name: Commit and Push to root
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add 擴充凍庫.xlsx
          
          # 檢查是否有內容變更，避免無異動時提交報錯
          git diff --quiet && git diff --staged --quiet || (git commit -m "更新: 每日自動同步擴充凍庫資料" && git push)
