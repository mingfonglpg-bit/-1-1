<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 倉儲庫位控管系統 V19 - Mobile Optimized</title>
    <style>
        /* --- 基礎樣式 --- */
        :root { 
            --primary: #6366f1; --warning: #f59e0b; --danger: #ef4444; --edit: #10b981;
            --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc; --text-dim: #94a3b8; --border: rgba(255, 255, 255, 0.1);
            --select-bg: #1e293b; --select-text: #c7d2fe;
            --color-polar-l: #38bdf8; --color-polar-r: #818cf8;
            --color-cool-l:  #fbbf24; --color-cool-r:  #fb7185;
            --color-normal:  #34d399; --color-cut:     #a855f7; 
        }
        * { box-sizing: border-box; transition: all 0.2s; }
        body { font-family: 'Inter', "Noto Sans TC", sans-serif; background: var(--bg); color: var(--text-main); margin: 0; line-height: 1.5; overflow-x: hidden; }
        .container { width: 95%; max-width: 1400px; margin: 10px auto; background: var(--card-bg); backdrop-filter: blur(20px); padding: 15px; border-radius: 20px; border: 1px solid var(--border); display: none; }
        
        /* 標題與按鈕區優化 */
        header { display: flex; flex-direction: column; gap: 15px; margin-bottom: 15px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .header-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
        
        /* 留意客戶框位列 - 手機版優化 */
        .notice-bar {
            background: rgba(245, 158, 11, 0.1);
            border-left: 4px solid var(--warning);
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            font-size: 13px;
            color: var(--warning);
            display: flex;
            gap: 10px;
        }
        .notice-content { display: flex; flex-direction: column; gap: 6px; }
        .notice-item { position: relative; padding-left: 15px; line-height: 1.4; word-break: break-all; }
        .notice-item::before { content: "•"; position: absolute; left: 0; font-weight: bold; }

        /* 儲位圖表控制 */
        .visual-header { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .visual-controls { display: grid; grid-template-columns: 1.5fr 1fr; gap: 8px; }

        /* 通用元件 */
        select.btn, input.btn { background: var(--select-bg) !important; color: var(--select-text) !important; border: 1px solid var(--border); padding: 10px; border-radius: 10px; outline: none; width: 100%; font-size: 14px; }
        .btn-main { padding: 10px; border-radius: 10px; border: none; background: var(--primary); color: white; cursor: pointer; font-weight: 600; font-size: 13px; justify-content: center; align-items: center; text-decoration: none; display: flex; gap: 5px; }
        .usage-badge { background: rgba(99, 102, 241, 0.15); color: var(--primary); padding: 10px; border-radius: 10px; text-align: center; font-weight: bold; border: 1px solid rgba(99, 102, 241, 0.2); font-size: 13px; }

        /* 儲位點點優化 */
        .slot { aspect-ratio: 1; border-radius: 50%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 10px; font-weight: bold; }
        .slot.occupied { background: var(--primary); color: white; }
        
        /* 搜尋框 */
        .search-wrapper { position: relative; margin: 15px 0; }
        .search-clear { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-dim); font-size: 20px; display: none; }

        /* 表格轉卡片樣式 */
        @media screen and (max-width: 768px) {
            thead { display: none; }
            tr { display: block; background: rgba(255, 255, 255, 0.02); margin-bottom: 15px; border-radius: 15px; border: 1px solid var(--border); padding: 10px; }
            td { display: flex; justify-content: space-between; align-items: center; padding: 8px 5px; border: none !important; font-size: 14px; }
            td::before { content: attr(data-label); color: var(--text-dim); font-size: 12px; font-weight: 500; }
            td b { margin: 0; }
            .action-btns { width: 100%; justify-content: flex-end; }
        }

        /* 跑馬燈 */
        .marquee-container { background: rgba(99, 102, 241, 0.1); border-radius: 8px; padding: 6px 12px; margin-bottom: 10px; overflow: hidden; white-space: nowrap; border: 1px solid rgba(99, 102, 241, 0.2); }
        .marquee-text { display: inline-block; animation: marquee 15s linear infinite; color: var(--primary); font-size: 13px; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        #loader { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:12000; justify-content:center; align-items:center; color:white; }
    </style>
</head>
<body>

<div id="loader">⚙️ 處理中...</div>

<div id="welcome-page" style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align: center; padding: 20px;">
    <h1 style="letter-spacing: 2px; font-size: 1.5rem; margin-bottom: 20px;">倉儲庫位控管系統 <span style="color:var(--primary)">V19</span></h1>
    <button class="btn-main" style="padding: 15px 60px; border-radius:30px; font-size:16px;" onclick="enterSystem()">啟動系統</button>
</div>

<div class="container" id="main-container">
    <header>
        <div class="header-top">
            <h2 style="margin:0; font-size: 1.2rem;">📦 庫位狀態</h2>
            <button id="adminBtn" onclick="toggleAdmin()" class="btn-main" style="background:rgba(167,139,250,0.1); color:#a78bfa; padding: 5px 10px;">🛠️ 管理員</button>
        </div>
        <div class="header-actions">
            <a href="https://mingfonglpg-bit.github.io/-/count.html" target="_blank" class="btn-main" style="background:#1e293b; border: 1px solid var(--border);">🔍 庫存量</a>
            <div id="usageInfo" class="usage-badge">使用率: --%</div>
            <button onclick="fetchData()" class="btn-main" style="background:#334155;">🔄 刷新</button>
            <button onclick="location.reload()" class="btn-main" style="background:#334155;">🏠 首頁</button>
        </div>
    </header>

    <div class="marquee-container">
        <div class="marquee-text">🔔 提醒：入庫請對號入座，出貨請核對效期。</div>
    </div>

    <div class="notice-bar">
        <span>⚠️</span>
        <div class="notice-content">
            <strong style="margin-bottom: 2px; display: block;">留意客戶與作業規範：</strong>
            <div class="notice-item">台北文華：單包印標籤，小數 1 位</div>
            <div class="notice-item">幸福天空 SLICE：出貨前須錄影 (司機/黑貓)</div>
            <div class="notice-item">FO/CO/SO/PRSTL：單包印標籤 (失真空勿出貨)</div>
            <div class="notice-item">咕嚕好吃：標籤加固 (失真空勿出貨)</div>
        </div>
    </div>

    <div id="admin-panel" style="display:none; background:rgba(99,102,241,0.05); padding:15px; border-radius:15px; border:1px solid var(--primary); margin-bottom:15px;">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
            <select id="addZone" class="btn"><option value="極冷庫-左">極冷庫-左</option><option value="極冷庫-右">極冷庫-右</option><option value="冷藏庫-左">冷藏庫-左</option><option value="冷藏庫-右">冷藏庫-右</option><option value="常溫區">常溫區</option></select>
            <select id="addFloor" class="btn"><option value="1F">1F</option><option value="2F">2F</option><option value="3F">3F</option><option value="4F">4F</option></select>
            <input type="number" id="addPos" placeholder="儲位" class="btn">
            <input type="text" id="addName" placeholder="產品" class="btn">
            <input type="text" id="addBatch" placeholder="批號" class="btn">
            <input type="date" id="addDate" class="btn">
            <input type="text" id="addNote" placeholder="備註" class="btn" style="grid-column: span 2;">
            <button onclick="commitAdd()" class="btn-main" style="grid-column: span 2; padding: 12px;">➕ 提交入庫</button>
        </div>
    </div>

    <section style="background: rgba(255,255,255,0.02); padding: 15px; border-radius: 15px; border: 1px solid var(--border);">
        <div class="visual-header">
            <b id="mapTitle" style="color:var(--primary); font-size: 14px;">區域圖示</b>
            <div class="visual-controls">
                <select id="vZone" onchange="renderVisual()" class="btn"><option value="極冷庫-左">極冷庫-左</option><option value="極冷庫-右">極冷庫-右</option><option value="冷藏庫-左">冷藏庫-左</option><option value="冷藏庫-右">冷藏庫-右</option><option value="常溫區">常溫區</option></select>
                <select id="vFloor" onchange="renderVisual()" class="btn"><option value="1F">1F</option><option value="2F">2F</option><option value="3F">3F</option><option value="4F">4F</option></select>
            </div>
        </div>
        <div id="visualGrid" style="display:grid; gap:6px; grid-template-columns: repeat(6, 1fr);"></div>
    </section>

    <div class="search-wrapper">
        <input type="text" id="searchInput" class="btn" style="height: 50px; font-size: 16px;" placeholder="🔍 搜尋產品、儲位或批號..." oninput="handleSearchInput(false)">
        <span id="clearSearch" class="search-clear" onclick="clearSearch()">✖</span>
    </div>

    <div id="tableContainer">
        <table style="width: 100%; border-collapse: collapse;">
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <div class="pagination" id="paginationCtrl"></div>
</div>

<script>
    /* 此處保留您原本的 JavaScript 邏輯，僅需將 renderTable 中資料顯示的標籤對應即可 */
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwGRptsGHH3MLrl4eU0UsCQ4lvxGE5goP3VF_FntVevNrG31h8VtXhjoYSpO56IYA_T/exec"; 
    const _KEY = "YWRtaW4xMjM="; 
    let inventory = [], zoneConfigs = {}, isAdmin = false, currentId = null;
    let currentPage = 1, rowsPerPage = 10;

    function getZoneColor(zone) {
        if (zone === "極冷庫-左") return "var(--color-polar-l)";
        if (zone === "極冷庫-右") return "var(--color-polar-r)";
        if (zone === "冷藏庫-左") return "var(--color-cool-l)";
        if (zone === "冷藏庫-右") return "var(--color-cool-r)";
        if (zone === "常溫區") return "var(--color-normal)";
        return "var(--primary)";
    }

    function enterSystem() { document.getElementById('welcome-page').style.display='none'; document.getElementById('main-container').style.display='block'; fetchData(); }

    async function fetchData() {
        toggleLoader(true);
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            inventory = data.inventory;
            zoneConfigs = data.configs;
            renderAll();
        } catch (e) { alert("連線失敗"); }
        toggleLoader(false);
    }

    function renderAll() { renderVisual(); renderTable(false); }

    function renderVisual() {
        const grid = document.getElementById('visualGrid');
        const zone = document.getElementById('vZone').value;
        const floor = document.getElementById('vFloor').value;
        const config = zoneConfigs[zone] || { maxPos: 22, cols: 6 };
        document.getElementById('mapTitle').innerText = `${zone} - ${floor}`;
        
        // 手機版固定每行 6-7 個圓點較美觀
        grid.style.gridTemplateColumns = `repeat(6, 1fr)`;
        grid.innerHTML = '';
        const zoneColor = getZoneColor(zone);

        for (let i = 1; i <= config.maxPos; i++) {
            const items = inventory.filter(d => d.zone === zone && d.floor === floor && d.pos == i);
            const slot = document.createElement('div');
            let statusStyle = '';

            if (items.length > 0) {
                statusStyle = `background: ${zoneColor}; color: white; border: none;`;
                if (items.some(item => (item.name || "").includes("(切)"))) statusStyle = `background: var(--color-cut); color: white;`;
                else if (items.some(item => (item.note || "").includes("報廢"))) statusStyle = `background: var(--danger); color: white;`;
            }
            slot.className = `slot`;
            slot.style = statusStyle;
            slot.innerHTML = i;
            slot.onclick = () => { 
                document.getElementById('searchInput').value = `${zone}${floor}-${i}`; 
                handleSearchInput(true);
                window.scrollTo({ top: document.getElementById('searchInput').offsetTop - 20, behavior: 'smooth' });
            };
            grid.appendChild(slot);
        }
    }

    function renderTable(isExact = false) {
        const kw = document.getElementById('searchInput').value.toLowerCase();
        const filtered = inventory.filter(i => {
            const fullPos = `${i.zone}${i.floor}-${i.pos}`.toLowerCase();
            const otherInfo = `${i.name}${i.batch}${i.note}`.toLowerCase();
            return isExact ? (fullPos === kw) : (fullPos + otherInfo).includes(kw);
        });
        
        const start = (currentPage - 1) * rowsPerPage;
        const pagedData = filtered.slice(start, start + rowsPerPage);
        
        document.getElementById('tableBody').innerHTML = pagedData.map(i => `
            <tr>
                <td data-label="儲位位置"><b style="color:${getZoneColor(i.zone)}">${i.zone.substring(0,2)}-${i.floor}-${i.pos}</b></td>
                <td data-label="產品名稱"><b>${i.name}</b></td>
                <td data-label="有效日期">${i.date ? i.date.split('T')[0] : '-'}</td>
                <td data-label="批號"><code>${i.batch || '-'}</code></td>
                <td data-label="操作">
                    <div class="action-btns" style="display:flex; gap:5px;">
                        <button class="btn-main" style="background:#475569; padding:5px 10px;" onclick="openReport('${i.id}')">回報</button>
                        ${isAdmin ? `<button class="btn-main" style="background:var(--danger); padding:5px 10px;" onclick="deleteItem('${i.id}')">刪</button>` : ''}
                    </div>
                </td>
            </tr>`).join('') || '<tr><td colspan="5" style="text-align:center; padding:30px;">查無資料</td></tr>';
        
        renderPagination(Math.ceil(filtered.length / rowsPerPage) || 1);
    }

    function handleSearchInput(isExact = false) { 
        document.getElementById('clearSearch').style.display = document.getElementById('searchInput').value ? 'block' : 'none'; 
        currentPage = 1; 
        renderTable(isExact); 
    }
    function clearSearch() { document.getElementById('searchInput').value = ''; handleSearchInput(false); }
    function renderPagination(total) {
        const ctrl = document.getElementById('paginationCtrl');
        ctrl.innerHTML = `<button class="page-btn" onclick="changePage(1)" ${currentPage===1?'disabled':''}>首頁</button>
                          <span style="color:var(--text-dim)">${currentPage}/${total}</span>
                          <button class="page-btn" onclick="changePage(${currentPage+1})" ${currentPage===total?'disabled':''}>下一頁</button>`;
    }
    function changePage(p) { currentPage = p; renderTable(false); }
    function toggleAdmin() {
        if(!isAdmin) { const p = prompt("金鑰:"); if(p && btoa(p) === _KEY) { isAdmin=true; document.getElementById('admin-panel').style.display='block'; renderTable(false); } }
        else { isAdmin=false; document.getElementById('admin-panel').style.display='none'; renderTable(false); }
    }
    function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
    function commitAdd() { alert('功能連結中...'); } /* 依需求補回原本 fetch 邏輯 */
</script>
</body>
</html>
