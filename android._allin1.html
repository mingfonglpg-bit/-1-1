<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 倉儲庫位控管系統 V17.9 Mobile Pro</title>
    <style>
        /* --- 以下為您要求「禁止變更」的原有基礎樣式 --- */
        :root { 
            --primary: #6366f1; --warning: #f59e0b; --danger: #ef4444; --edit: #10b981;
            --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc; --text-dim: #94a3b8; --border: rgba(255, 255, 255, 0.1);
            --select-bg: #1e293b; --select-text: #c7d2fe;
        }
        * { box-sizing: border-box; transition: all 0.2s; }
        body { font-family: 'Inter', "Noto Sans TC", sans-serif; background: var(--bg); color: var(--text-main); margin: 0; line-height: 1.5; }
        .container { width: 95%; max-width: 1400px; margin: 20px auto; background: var(--card-bg); backdrop-filter: blur(20px); padding: 25px; border-radius: 28px; border: 1px solid var(--border); display: none; }
        select.btn, input.btn { background: var(--select-bg) !important; color: var(--select-text) !important; border: 1px solid var(--border); padding: 12px; border-radius: 12px; outline: none; width: 100%; font-size: 14px; }
        .usage-badge { background: rgba(99, 102, 241, 0.15); color: var(--primary); padding: 8px 16px; border-radius: 12px; font-weight: bold; border: 1px solid rgba(99, 102, 241, 0.2); }
        .slot { aspect-ratio: 1; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 11px; }
        .slot.occupied { background: var(--primary); color: white; }
        .slot.status-warning { background: var(--warning) !important; }
        .slot.status-danger { background: var(--danger) !important; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; margin-top: 15px; }
        th { color: var(--text-dim); padding: 15px 20px; text-align: left; font-size: 13px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 22px 20px; background: rgba(255, 255, 255, 0.03); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); vertical-align: middle; }
        td:first-child { border-left: 1px solid var(--border); border-radius: 15px 0 0 15px; }
        td:last-child { border-right: 1px solid var(--border); border-radius: 0 15px 15px 0; }
        td b { display: block; font-size: 16px; color: var(--text-main); margin-bottom: 4px; }
        .report-label { display: inline-block; margin-top: 6px; padding: 4px 10px; font-size: 11px; background: rgba(245, 158, 11, 0.15); color: var(--warning); border-radius: 6px; font-weight: bold; }
        .search-wrapper { position: relative; margin: 25px 0 15px 0; }
        .search-clear { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-dim); font-size: 22px; display: none; }
        .btn-main { padding: 10px 20px; border-radius: 12px; border: none; background: var(--primary); color: white; cursor: pointer; font-weight: 600; font-size: 14px; display: inline-flex; align-items: center; gap: 5px; }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:11000; justify-content:center; align-items:center; backdrop-filter: blur(5px); }
        .modal-content { background:var(--select-bg); padding:30px; border-radius:28px; width:90%; max-width:480px; border:1px solid var(--primary); }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 30px; padding-bottom: 40px; }
        .page-btn { padding: 10px 18px; border-radius: 12px; border: 1px solid var(--border); background: var(--select-bg); color: white; cursor: pointer; }
        #loader { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:12000; justify-content:center; align-items:center; color:white; font-weight: bold; }

        /* --- 📱 手機版專屬優化 (僅針對小螢幕生效) --- */
        @media screen and (max-width: 768px) {
            .container { padding: 15px; border-radius: 20px; }
            header { flex-direction: column; align-items: flex-start !important; gap: 15px; }
            .usage-badge { width: 100%; text-align: center; }
            
            /* 表格轉卡片排版 */
            thead { display: none; } /* 隱藏表頭 */
            table, tbody, tr, td { display: block; width: 100%; }
            tr { margin-bottom: 15px; border: 1px solid var(--border); border-radius: 15px; overflow: hidden; }
            td { 
                padding: 12px 15px; 
                text-align: right; 
                border: none !important; 
                border-bottom: 1px solid rgba(255,255,255,0.05) !important; 
                position: relative;
                display: flex;
                justify-content: space-between;
                align-items: center;
                border-radius: 0 !important;
            }
            td:last-child { border-bottom: none !important; }
            
            /* 透過 pseudo-element 顯示欄位名稱 */
            td::before {
                content: attr(data-label);
                float: left;
                color: var(--text-dim);
                font-size: 12px;
                font-weight: normal;
            }
            
            /* 調整手機版文字大小與對齊 */
            td b { margin-bottom: 0; font-size: 14px; text-align: right; }
            .action-btns { justify-content: flex-end; width: 100%; }
            .search-wrapper input.btn { height: 50px; font-size: 14px; }
            .pagination { flex-wrap: wrap; font-size: 12px; }
        }
    </style>
</head>
<body>

<div id="loader">⚙️ 資料處理中...</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3 style="color:var(--edit); margin-top:0;">📝 編輯庫存數據</h3>
        <input type="hidden" id="editId">
        <div style="margin-bottom:15px;"><label style="font-size:12px; color:var(--text-dim);">產品名稱</label><input type="text" id="editName" class="btn"></div>
        <div style="margin-bottom:15px;"><label style="font-size:12px; color:var(--text-dim);">批號</label><input type="text" id="editBatch" class="btn"></div>
        <div style="margin-bottom:15px;"><label style="font-size:12px; color:var(--text-dim);">有效日期</label><input type="date" id="editDate" class="btn"></div>
        <div style="margin-bottom:15px;"><label style="font-size:12px; color:var(--text-dim);">備註說明</label><input type="text" id="editNote" class="btn"></div>
        <div style="display:flex; gap:12px; margin-top:25px;">
            <button class="btn-main" style="background:#475569; flex:1;" onclick="closeModal('editModal')">取消</button>
            <button class="btn-main" style="background:var(--edit); flex:1;" onclick="submitEdit()">儲存更新</button>
        </div>
    </div>
</div>

<div id="reportModal" class="modal">
    <div class="modal-content">
        <h3 style="color:var(--primary); margin-top:0;">🚩 狀態回報</h3>
        <select id="reportType" class="btn" style="margin-bottom:15px;"><option value="報廢">🚫 報廢</option><option value="異常">⚠️ 異常</option><option value="正常">✅ 正常</option><option value="移位">📦 移位</option></select>
        <input type="text" id="reportReason" class="btn" placeholder="請輸入回報原因或說明...">
        <div style="display:flex; gap:12px; margin-top:25px;">
            <button class="btn-main" style="background:#475569; flex:1;" onclick="closeModal('reportModal')">取消</button>
            <button class="btn-main" style="flex:1;" onclick="submitReport()">提交</button>
        </div>
    </div>
</div>

<div id="welcome-page" style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align: center; padding: 20px;">
    <h1 style="letter-spacing: 4px; font-size: 2.5rem; margin-bottom: 10px;">物流監控系統 <span style="color:var(--primary)">V17.9</span></h1>
    <button class="btn-main" style="padding: 20px 80px; border-radius:50px;" onclick="enterSystem()">啟動系統</button>
</div>

<div class="container" id="main-container">
    <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h2 style="margin:0;">📦 庫位控管</h2>
        <div style="display:flex; gap:12px; align-items:center;">
            <div id="usageInfo" class="usage-badge">使用率: --%</div>
            <button onclick="fetchData()" class="btn-main" style="background:#334155;">🔄 刷新</button>
            <button id="adminBtn" onclick="toggleAdmin()" class="btn-main" style="background:rgba(167,139,250,0.1); color:#a78bfa;">🛠️ 管理員</button>
        </div>
    </header>

    <div id="admin-panel" style="display:none; background:rgba(99,102,241,0.05); padding:20px; border-radius:24px; border:1px solid var(--primary); margin-bottom:25px;">
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap:10px;">
            <select id="addZone" class="btn"><option value="極冷庫-左">極冷庫-左</option><option value="極冷庫-右">極冷庫-右</option><option value="冷藏庫-左">冷藏庫-左</option><option value="冷藏庫-右">冷藏庫-右</option><option value="常溫區">常溫區</option></select>
            <select id="addFloor" class="btn"><option value="1F">1F</option><option value="2F">2F</option><option value="3F">3F</option><option value="4F">4F</option></select>
            <input type="number" id="addPos" placeholder="儲位" class="btn"><input type="text" id="addName" placeholder="產品" class="btn"><input type="text" id="addBatch" placeholder="批號" class="btn"><input type="date" id="addDate" class="btn"><input type="text" id="addNote" placeholder="備註" class="btn">
            <button onclick="commitAdd()" class="btn-main">➕ 入庫</button>
        </div>
    </div>

    <section style="background: rgba(255,255,255,0.02); padding: 20px; border-radius: 24px; border: 1px solid var(--border);">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <b id="mapTitle" style="color:var(--primary);">載入中...</b>
            <div style="display:flex; gap:8px;">
                <select id="vZone" onchange="renderVisual()" class="btn" style="width:120px;"><option value="極冷庫-左">極冷庫-左</option><option value="極冷庫-右">極冷庫-右</option><option value="冷藏庫-左">冷藏庫-左</option><option value="冷藏庫-右">冷藏庫-右</option><option value="常溫區">常溫區</option></select>
                <select id="vFloor" onchange="renderVisual()" class="btn" style="width:75px;"><option value="1F">1F</option><option value="2F">2F</option><option value="3F">3F</option><option value="4F">4F</option></select>
            </div>
        </div>
        <div id="visualGrid" style="display:grid; gap:8px;"></div>
    </section>

    <div class="search-wrapper">
        <input type="text" id="searchInput" class="btn" style="height: 55px;" placeholder="🔍 快速搜尋..." oninput="handleSearchInput()">
        <span id="clearSearch" class="search-clear" onclick="clearSearch()">✖</span>
    </div>

    <div style="overflow-x:auto;">
        <table>
            <thead><tr><th>儲位</th><th>產品</th><th>效期</th><th>批號</th><th>狀態</th><th>功能</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="pagination" id="paginationCtrl"></div>
</div>

<script>
    // ⚠️ 請填入您的 GAS URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwGRptsGHH3MLrl4eU0UsCQ4lvxGE5goP3VF_FntVevNrG31h8VtXhjoYSpO56IYA_T/exec"; 
    const _KEY = "YWRtaW4xMjM="; 
    let inventory = [], zoneConfigs = {}, isAdmin = false, currentId = null;
    let currentPage = 1, rowsPerPage = 10;

    function enterSystem() { document.getElementById('welcome-page').style.display='none'; document.getElementById('main-container').style.display='block'; fetchData(); }

    async function fetchData() {
        toggleLoader(true);
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            inventory = data.inventory;
            zoneConfigs = data.configs;
            renderAll();
        } catch (e) { alert("讀取失敗"); }
        toggleLoader(false);
    }

    function renderAll() { renderVisual(); renderTable(); }

    function renderVisual() {
        const grid = document.getElementById('visualGrid');
        const zone = document.getElementById('vZone').value;
        const floor = document.getElementById('vFloor').value;
        const config = zoneConfigs[zone] || { maxPos: 22, cols: 11 };
        document.getElementById('mapTitle').innerText = `${zone} - ${floor}`;
        grid.style.gridTemplateColumns = `repeat(${config.cols}, 1fr)`;
        grid.innerHTML = '';
        for (let i = 1; i <= config.maxPos; i++) {
            const items = inventory.filter(d => d.zone === zone && d.floor === floor && d.pos == i);
            const slot = document.createElement('div');
            let statusClass = '';
            if (items.length > 0) {
                statusClass = 'occupied';
                if (items.some(item => (item.note || "").includes("報廢"))) statusClass = 'status-danger';
                else if (items.some(item => (item.note || "").includes("異常"))) statusClass = 'status-warning';
            }
            slot.className = `slot ${statusClass}`;
            slot.innerHTML = `<b>${i}</b>`;
            slot.onclick = () => { document.getElementById('searchInput').value = `${zone}${floor}-${i}`; handleSearchInput(); };
            grid.appendChild(slot);
        }
        const zoneItems = inventory.filter(i => i.zone === zone);
        const occupiedCount = new Set(zoneItems.map(i => `${i.floor}-${i.pos}`)).size;
        document.getElementById('usageInfo').innerText = `使用率: ${((occupiedCount/(config.maxPos*4))*100).toFixed(1)}%`;
    }

    // --- 修改渲染函數以支援手機版標籤 (data-label) ---
    function renderTable() {
        const kw = document.getElementById('searchInput').value.toLowerCase();
        const filtered = inventory.filter(i => `${i.zone}${i.floor}-${i.pos}${i.name}${i.batch}`.toLowerCase().includes(kw));
        const totalPages = Math.ceil(filtered.length / rowsPerPage) || 1;
        const start = (currentPage - 1) * rowsPerPage;
        const pagedData = filtered.slice(start, start + rowsPerPage);

        document.getElementById('tableBody').innerHTML = pagedData.map(i => `
            <tr>
                <td data-label="儲位位置"><b>${i.floor}-${i.pos}</b><small>${i.zone}</small></td>
                <td data-label="產品內容"><b>${i.name}</b>${i.note ? `<span class="report-label">⚠️ ${i.note}</span>` : ''}</td>
                <td data-label="有效日期">${i.date ? i.date.split('T')[0] : '-'}</td>
                <td data-label="批號碼"><code>${i.batch}</code></td>
                <td data-label="備註狀態"><small>${i.note ? '有紀錄' : '正常'}</small></td>
                <td data-label="功能操作">
                    <div class="action-btns" style="display:flex; gap:5px;">
                        <button class="btn-main" style="background:#475569; padding:6px 10px;" onclick="openReport('${i.id}')">回報</button>
                        ${isAdmin ? `<button class="btn-main" style="background:var(--edit); padding:6px 10px;" onclick="openEdit('${i.id}')">編輯</button>` : ''}
                    </div>
                </td>
            </tr>
        `).join('') || '<tr><td colspan="6" style="text-align:center; padding:30px;">無資料</td></tr>';
        renderPagination(totalPages, filtered.length);
    }

    function renderPagination(total, items) {
        const ctrl = document.getElementById('paginationCtrl');
        ctrl.innerHTML = `
            <button class="page-btn" onclick="changePage(1)" ${currentPage===1?'disabled':''}>首頁</button>
            <span style="font-size:13px; color:var(--text-dim)">${currentPage} / ${total}</span>
            <button class="page-btn" onclick="changePage(${currentPage+1})" ${currentPage===total?'disabled':''}>下一頁</button>
        `;
    }

    function changePage(p) { currentPage = p; renderTable(); }
    function handleSearchInput() { document.getElementById('clearSearch').style.display = document.getElementById('searchInput').value ? 'block' : 'none'; currentPage=1; renderTable(); }
    function clearSearch() { document.getElementById('searchInput').value = ''; handleSearchInput(); }
    function toggleAdmin() {
        if(!isAdmin) {
            const p = prompt("管理金鑰:");
            if(p && btoa(p) === _KEY) { isAdmin=true; document.getElementById('admin-panel').style.display='block'; document.getElementById('adminBtn').innerText="🔐 管理中"; renderTable(); }
        } else { isAdmin=false; document.getElementById('admin-panel').style.display='none'; document.getElementById('adminBtn').innerText="🛠️ 管理員"; renderTable(); }
    }
    function openEdit(id) {
        const item = inventory.find(i => i.id.toString() === id.toString());
        document.getElementById('editId').value = id;
        document.getElementById('editName').value = item.name;
        document.getElementById('editBatch').value = item.batch;
        document.getElementById('editDate').value = item.date ? item.date.split('T')[0] : '';
        document.getElementById('editNote').value = item.note || '';
        document.getElementById('editModal').style.display = 'flex';
    }
    async function submitEdit() {
        toggleLoader(true);
        await fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify({action:'edit', id:document.getElementById('editId').value, name:document.getElementById('editName').value, batch:document.getElementById('editBatch').value, date:document.getElementById('editDate').value, note:document.getElementById('editNote').value}) });
        closeModal('editModal'); fetchData();
    }
    async function submitReport() {
        toggleLoader(true);
        await fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify({action:'report', id:currentId, type:document.getElementById('reportType').value, reason:document.getElementById('reportReason').value}) });
        closeModal('reportModal'); fetchData();
    }
    async function commitAdd() {
        toggleLoader(true);
        await fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify({action:"add", zone:document.getElementById('addZone').value, floor:document.getElementById('addFloor').value, pos:document.getElementById('addPos').value, name:document.getElementById('addName').value, batch:document.getElementById('addBatch').value, date:document.getElementById('addDate').value, note:document.getElementById('addNote').value}) });
        fetchData();
    }
    function openReport(id) { currentId = id; document.getElementById('reportModal').style.display = 'flex'; }
    function closeModal(m) { document.getElementById(m).style.display = 'none'; }
    function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
</script>
</body>
</html>
