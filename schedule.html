<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 TASK COMMAND CENTER V3.1</title>
    <style>
        :root { 
            --primary: #6366f1; --warning: #f59e0b; --danger: #ef4444; 
            --bg: #020617; --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc; --text-dim: #94a3b8; --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; font-family: 'Inter', "Noto Sans TC", sans-serif; }
        body { background: var(--bg); color: var(--text-main); margin: 0; padding: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        h1 { margin: 0; font-size: 28px; letter-spacing: 2px; font-weight: 800; }
        .system-version { font-size: 14px; font-weight: bold; display: block; margin-top: 5px; color: var(--primary); }

        /* 新增：統計面板樣式 */
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); padding: 15px 20px; border-radius: 16px; backdrop-filter: blur(10px); position: relative; }
        .stat-card::after { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--primary); border-radius: 4px 0 0 4px; }
        .stat-card.urgent::after { background: var(--danger); }
        .stat-card small { color: var(--text-dim); font-size: 12px; font-weight: 600; }
        .stat-card .val { font-size: 28px; font-weight: bold; margin-top: 5px; }

        .controls { display: flex; gap: 12px; margin-bottom: 20px; }
        .btn { padding: 10px 20px; border-radius: 8px; cursor: pointer; border: none; font-weight: bold; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; display: none; }
        .btn-logout { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); display: none; }
        
        .board-container { display: flex; gap: 20px; overflow-x: auto; min-height: 60vh; }
        .board-column { flex: 1; min-width: 310px; background: rgba(255,255,255,0.02); border-radius: 15px; padding: 15px; border: 1px solid var(--border); }
        .board-column h3 { color: var(--text-dim); font-size: 16px; margin-top: 0; display: flex; justify-content: space-between; }
        
        .task-card { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; }
        .task-card:hover { transform: translateY(-3px); border-color: var(--primary); }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .alert-glow { border: 2px solid var(--danger) !important; animation: pulse 2s infinite; }
        
        .task-tag { font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: bold; display: inline-block; margin-bottom: 8px; }
        .tag-alert { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .tag-warning { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .tag-normal { background: rgba(99, 102, 241, 0.2); color: #818cf8; }
        
        .status-menu { position: fixed; background: #1e293b; border: 1px solid var(--primary); border-radius: 10px; padding: 8px; z-index: 2000; display: none; box-shadow: 0 10px 25px rgba(0,0,0,0.5); min-width: 140px; }
        .status-menu button { display: block; width: 100%; padding: 10px; background: transparent; border: none; color: white; text-align: left; cursor: pointer; font-weight: bold; }
        #loader { position: fixed; top: 20px; right: 20px; background: var(--primary); padding: 8px 20px; border-radius: 30px; display: none; z-index: 3000; }
    </style>
</head>
<body>

<div id="loader">⚙️ 同步中...</div>

<div class="header">
    <div>
        <h1>TASK CENTER</h1>
        <span class="system-version">V3.1 穩定版 (自動效期優化)</span>
    </div>
    <button id="auth-btn" class="btn" style="background:rgba(255,255,255,0.05); color:white;" onclick="authenticate()">🔒 管理登入</button>
</div>

<div class="stat-grid">
    <div class="stat-card">
        <small>今日預計進貨</small>
        <div class="val" id="stat-inbound">0</div>
    </div>
    <div class="stat-card">
        <small>待處理任務</small>
        <div class="val" id="stat-pending" style="color: var(--warning);">0</div>
    </div>
    <div class="stat-card urgent">
        <small>效期警示項目</small>
        <div class="val" id="stat-alert" style="color: var(--danger);">0</div>
    </div>
</div>

<div class="controls">
    <button id="add-btn" class="btn btn-primary" onclick="addTask()">➕ 新增任務</button>
    <button id="logout-btn" class="btn btn-logout" onclick="logoutAdmin()">🚪 離開管理模式</button>
</div>

<div id="status-menu" class="status-menu">
    <button onclick="updateStatus('待處理')">⏳ 待處理</button>
    <button onclick="updateStatus('執行中')">🚀 執行中</button>
    <button onclick="updateStatus('已完成')">✅ 已完成</button>
    <button id="del-btn" style="display:none; color:var(--danger); border-top:1px solid var(--border);" onclick="deleteTask()">🗑️ 刪除任務</button>
</div>

<div class="board-container">
    <div class="board-column"><h3>⏳ 待處理 <span id="c-pending">0</span></h3><div id="col-pending"></div></div>
    <div class="board-column"><h3>🚀 執行中 <span id="c-progress">0</span></h3><div id="col-progress"></div></div>
    <div class="board-column"><h3>✅ 已完成 <span id="c-done">0</span></h3><div id="col-done"></div></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzSGXKa_EtiNUNTJ8Wy3HzFdxnFOEh7LqD_VEB9M-TtJNNcIhKUNKQL2TygUo1pqKMu/exec";
    let isAdmin = false; 
    let selectedId = null;

    function formatDisplayDate(dateStr) {
        if (!dateStr || dateStr === "未定") return "未定";
        const d = new Date(dateStr);
        return isNaN(d.getTime()) ? dateStr : d.toLocaleDateString('zh-TW');
    }

    function calculateDays(dateStr) {
        if (!dateStr || dateStr === "未定") return null;
        const target = new Date(dateStr);
        if (isNaN(target.getTime())) return null;
        const today = new Date();
        today.setHours(0,0,0,0);
        return Math.ceil((target - today) / 86400000);
    }

    function authenticate() {
        if (prompt("管理員密碼：") === "admin123") {
            isAdmin = true;
            document.getElementById('auth-btn').style.display = 'none';
            document.getElementById('add-btn').style.display = 'block';
            document.getElementById('logout-btn').style.display = 'block';
            document.getElementById('del-btn').style.display = 'block';
        }
    }

    function logoutAdmin() {
        isAdmin = false;
        document.getElementById('auth-btn').style.display = 'block';
        document.getElementById('add-btn').style.display = 'none';
        document.getElementById('logout-btn').style.display = 'none';
        document.getElementById('del-btn').style.display = 'none';
    }

    async function fetchData() {
        document.getElementById('loader').style.display = 'block';
        try {
            const res = await fetch(`${SCRIPT_URL}?target=schedule`);
            const data = await res.json();
            render(data.schedule);
        } catch (e) { console.error(e); }
        document.getElementById('loader').style.display = 'none';
    }

    function render(tasks) {
        const cols = { '待處理': 'col-pending', '執行中': 'col-progress', '已完成': 'col-done' };
        const counts = { '待處理': 0, '執行中': 0, '已完成': 0 };
        let stats = { inbound: 0, alert: 0 };

        Object.values(cols).forEach(id => document.getElementById(id).innerHTML = '');

        tasks.forEach(t => {
            const status = (t['狀態'] || '待處理').trim();
            const type = t['類型'] || '一般';
            const dateVal = t['預計到貨時間'] || t['Date'] || '未定';
            const diffDays = calculateDays(dateVal);
            
            // 統計邏輯
            if (type.includes('進貨')) stats.inbound++;
            if (type.includes('天') || type.includes('效期')) stats.alert++;

            let alertClass = '', tagClass = 'tag-normal';
            if (status !== '已完成') {
                if (type.includes('14天') || (diffDays !== null && diffDays <= 14)) {
                    alertClass = 'alert-glow'; tagClass = 'tag-alert';
                } else if (type.includes('30天') || (diffDays !== null && diffDays <= 30)) {
                    tagClass = 'tag-warning';
                }
            }

            if (counts.hasOwnProperty(status)) counts[status]++;
            
            const card = `<div class="task-card ${alertClass}" onclick="openMenu(event, '${t['ID']}')">
                <span class="task-tag ${tagClass}">${type}</span>
                <div style="font-weight:600;">${t['內容']}</div>
                <div style="font-size:12px; color:var(--warning); margin-top:8px;">📅 ${formatDisplayDate(dateVal)}</div>
            </div>`;
            
            if (cols[status]) document.getElementById(cols[status]).innerHTML += card;
        });

        // 更新頂部統計面板
        document.getElementById('stat-inbound').innerText = stats.inbound;
        document.getElementById('stat-pending').innerText = counts['待處理'];
        document.getElementById('stat-alert').innerText = stats.alert;

        // 更新看板小數字
        document.getElementById('c-pending').innerText = counts['待處理'];
        document.getElementById('c-progress').innerText = counts['執行中'];
        document.getElementById('c-done').innerText = counts['已完成'];
    }

    function openMenu(e, id) { e.stopPropagation(); selectedId = id; const m = document.getElementById('status-menu'); m.style.display = 'block'; m.style.top = e.clientY + 'px'; m.style.left = e.clientX + 'px'; }
    async function updateStatus(s) { await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'updateStatus', id: selectedId, status: s }) }); fetchData(); }
    async function deleteTask() { if (confirm("確定刪除？")) { await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteTask', id: selectedId }) }); fetchData(); } }
    async function addTask() { 
        const c = prompt("任務內容："); if (!c) return;
        const a = prompt("預計到貨時間 (YYYY/MM/DD)：", new Date().toLocaleDateString());
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'addTask', content: c, arrival: a }) });
        fetchData();
    }
    window.onclick = () => document.getElementById('status-menu').style.display = 'none';
    window.onload = fetchData;
</script>
</body>
</html>
