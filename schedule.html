<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 極冷庫 | 任務排程看板</title>
    <style>
        :root { 
            --primary: #6366f1; --warning: #f59e0b; --danger: #ef4444; --edit: #10b981;
            --bg: #020617; --card-bg: rgba(30, 41, 59, 0.5);
            --text-main: #f8fafc; --text-dim: #94a3b8; --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; font-family: 'Inter', "Noto Sans TC", sans-serif; }
        body { background: var(--bg); color: var(--text-main); margin: 0; padding: 20px; overflow-x: hidden; }

        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .header h1 { margin: 0; font-size: 24px; letter-spacing: 2px; color: var(--primary); }
        #live-clock { color: var(--text-dim); font-family: monospace; font-size: 18px; }

        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); padding: 20px; border-radius: 20px; backdrop-filter: blur(10px); position: relative; overflow: hidden; }
        .stat-card::after { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--primary); }
        .stat-card.urgent::after { background: var(--danger); }
        .stat-card .val { font-size: 32px; font-weight: bold; margin-top: 5px; }

        .board-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }
        .board-column { background: rgba(255,255,255,0.02); border-radius: 24px; padding: 20px; min-height: 600px; border: 1px solid var(--border); }
        .board-column h3 { margin-top: 0; display: flex; justify-content: space-between; align-items: center; color: var(--text-dim); border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .count-tag { background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 10px; font-size: 12px; }

        .task-card { background: #1e293b; border-radius: 16px; padding: 16px; margin-bottom: 15px; border: 1px solid var(--border); transition: 0.2s; }
        .task-card:hover { transform: translateY(-3px); border-color: var(--primary); }
        .task-tag { font-size: 10px; padding: 3px 8px; border-radius: 6px; font-weight: bold; margin-bottom: 8px; display: inline-block; }
        .tag-inbound { background: rgba(99, 102, 241, 0.2); color: #818cf8; border: 1px solid #818cf8; }
        .tag-outbound { background: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid #34d399; }
        .tag-alert { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid #f87171; }
        .tag-other { background: rgba(148, 163, 184, 0.2); color: #94a3b8; border: 1px solid #94a3b8; }

        .task-title { font-weight: 600; font-size: 15px; margin-bottom: 8px; display: block; }
        .task-info { font-size: 12px; color: var(--text-dim); display: flex; flex-direction: column; gap: 4px; }
        
        #loader { position: fixed; top: 20px; right: 20px; background: var(--primary); color: white; padding: 5px 15px; border-radius: 20px; display: none; z-index: 100; }
    </style>
</head>
<body>

    <div id="loader">⚙️ 同步中...</div>

    <div class="header">
        <div><h1>TASK COMMAND CENTER</h1><small>極冷庫任務排程系統 V1.0</small></div>
        <div id="live-clock"></div>
    </div>

    <div class="stat-grid">
        <div class="stat-card"><small>今日預計進貨</small><div class="val" id="stat-inbound">0</div></div>
        <div class="stat-card"><small>待處理任務</small><div class="val" id="stat-pending" style="color: var(--warning);">0</div></div>
        <div class="stat-card urgent"><small>效期警示項目</small><div class="val" id="stat-alert" style="color: var(--danger);">0</div></div>
    </div>

    <div class="board-container">
        <div class="board-column"><h3>待處理 <span class="count-tag" id="count-pending">0</span></h3><div id="col-pending"></div></div>
        <div class="board-column"><h3>執行中 <span class="count-tag" id="count-progress">0</span></h3><div id="col-progress"></div></div>
        <div class="board-column"><h3>已完成 <span class="count-tag" id="count-done">0</span></h3><div id="col-done"></div></div>
    </div>

    <script>
        // 這裡使用的是您提供的 GAS 部署網址 
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwOCwp9RommFfOY7BCZptvd4_4J6wKVHir-VrEuwgvPOS1yOOdV3qoDjq4A5Ums_loZ/exec";

        async function fetchScheduleData() {
            document.getElementById('loader').style.display = 'block';
            try {
                // 修正：target=schedule 確保呼叫 handleScheduleRequest() 
                const res = await fetch(`${SCRIPT_URL}?target=schedule`);
                const result = await res.json();
                
                // 修正：檢查後端回傳的關鍵字為 'schedule' 而非 'tasks' 
                if (result.schedule && Array.isArray(result.schedule)) {
                    updateUI(result.schedule);
                }
            } catch (e) { 
                console.error("抓取資料失敗:", e); 
            }
            document.getElementById('loader').style.display = 'none';
        }

        function updateUI(tasks) {
            const cols = { '待處理': 'col-pending', '執行中': 'col-progress', '已完成': 'col-done' };
            const counts = { '待處理': 0, '執行中': 0, '已完成': 0 };
            let stats = { inbound: 0, alert: 0 };

            // 清空舊卡片
            Object.values(cols).forEach(id => document.getElementById(id).innerHTML = '');

            tasks.forEach(t => {
                // 對應 GAS 中定義的中文字段：時間, 類型, 內容, 狀態, 備註 
                const status = t['狀態'] || '待處理';
                const type = t['類型'] || '一般任務';
                const content = t['內容'] || '無標題';
                const time = t['時間'] || '';
                const note = t['備註'] || '無';

                // 更新統計數據
                if (type === '進貨預約') stats.inbound++;
                if (type === '效期警示') stats.alert++;
                if (counts.hasOwnProperty(status)) counts[status]++;

                const colId = cols[status] || 'col-pending';
                const tagClass = getTagClass(type);
                
                // 格式化日期顯示
                const dateStr = time ? new Date(time).toLocaleDateString() : '未定';

                const card = `
                    <div class="task-card">
                        <span class="task-tag ${tagClass}">${type}</span>
                        <span class="task-title">${content}</span>
                        <div class="task-info">
                            <span>⏰ 時間: ${dateStr}</span>
                            <span>📝 備註: ${note}</span>
                        </div>
                    </div>`;
                
                const columnElement = document.getElementById(colId);
                if (columnElement) columnElement.innerHTML += card;
            });

            // 更新看板上方數字
            document.getElementById('stat-inbound').innerText = stats.inbound;
            document.getElementById('stat-alert').innerText = stats.alert;
            document.getElementById('stat-pending').innerText = counts['待處理'];
            
            // 更新欄位標題計數
            document.getElementById('count-pending').innerText = counts['待處理'];
            document.getElementById('count-progress').innerText = counts['執行中'];
            document.getElementById('count-done').innerText = counts['已完成'];
        }

        function getTagClass(type) {
            if (type === '進貨預約') return 'tag-inbound';
            if (type === '出貨任務') return 'tag-outbound';
            if (type === '效期警示') return 'tag-alert';
            if (type === '異常回報') return 'tag-alert';
            return 'tag-other';
        }

        function updateClock() { 
            document.getElementById('live-clock').innerText = new Date().toLocaleString(); 
        }

        setInterval(updateClock, 1000);
        // 每 5 分鐘自動刷新一次
        setInterval(fetchScheduleData, 300000);

        window.onload = () => { 
            updateClock(); 
            fetchScheduleData(); 
        };
    </script>
</body>
</html>
