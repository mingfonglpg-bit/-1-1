<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 倉儲庫位控管系統 V18.3 Pro</title>
    <style>
        /* --- 基礎樣式 (嚴禁變更) --- */
        :root { 
            --primary: #6366f1; --warning: #f59e0b; --danger: #ef4444; --edit: #10b981;
            --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc; --text-dim: #94a3b8; --border: rgba(255, 255, 255, 0.1);
            --select-bg: #1e293b; --select-text: #c7d2fe;
            --color-polar-l: #38bdf8; --color-polar-r: #818cf8;
            --color-cool-l:  #fbbf24; --color-cool-r:  #fb7185;
            --color-normal:  #34d399; --color-cut:     #a855f7; 
        }
        * { box-sizing: border-box; transition: all 0.2s; }
        body { font-family: 'Inter', "Noto Sans TC", sans-serif; background: var(--bg); color: var(--text-main); margin: 0; line-height: 1.5; }
        .container { width: 95%; max-width: 1400px; margin: 20px auto; background: var(--card-bg); backdrop-filter: blur(20px); padding: 25px; border-radius: 28px; border: 1px solid var(--border); display: none; }
        
        .search-wrapper { position: relative; margin: 25px 0 15px 0; }
        .search-clear { 
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.1); color: var(--text-dim); border: none;
            width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
            display: none; align-items: center; justify-content: center; font-size: 14px; z-index: 10;
        }
        .search-clear:hover { background: var(--danger); color: white; }

        select.btn, input.btn { background: var(--select-bg) !important; color: var(--select-text) !important; border: 1px solid var(--border); padding: 12px; border-radius: 12px; outline: none; width: 100%; font-size: 14px; }
        .usage-badge { background: rgba(99, 102, 241, 0.15); color: var(--primary); padding: 8px 16px; border-radius: 12px; font-weight: bold; border: 1px solid rgba(99, 102, 241, 0.2); }
        
        .slot { aspect-ratio: 1; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 11px; position: relative; }
        .slot.occupied { background: var(--primary); color: white; }
        .slot.status-warning { background: var(--warning) !important; }
        .slot.status-danger { background: var(--danger) !important; }
        .slot.status-cut { background: var(--color-cut) !important; color: white; font-weight: bold; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        td { padding: 20px; background: rgba(255, 255, 255, 0.03); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        td:first-child { border-left: 1px solid var(--border); border-radius: 15px 0 0 15px; }
        td:last-child { border-right: 1px solid var(--border); border-radius: 0 15px 15px 0; }
        
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:11000; justify-content:center; align-items:center; backdrop-filter: blur(5px); }
        .modal-content { background:var(--select-bg); padding:30px; border-radius:28px; width:90%; max-width:480px; border:1px solid var(--primary); }
        .btn-main { padding: 10px 20px; border-radius: 12px; border: none; background: var(--primary); color: white; cursor: pointer; font-weight: 600; font-size: 14px; display: inline-flex; align-items: center; gap: 5px; text-decoration: none; }
        
        .pagination { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px; padding-bottom: 20px; }
        .page-btn { padding: 8px 16px; border-radius: 10px; background: var(--select-bg); border: 1px solid var(--border); color: white; cursor: pointer; }

        @media screen and (max-width: 768px) {
            header { flex-direction: column; align-items: flex-start !important; gap: 15px; }
            .header-actions { width: 100%; display: grid !important; grid-template-columns: 1fr 1fr; gap: 8px; }
            thead { display: none; }
            table, tbody, tr, td { display: block; width: 100%; }
            tr { margin-bottom: 15px; border: 1px solid var(--border); border-radius: 15px; }
            td { padding: 12px 15px; text-align: right; display: flex; justify-content: space-between; align-items: center; border: none !important; border-bottom: 1px solid rgba(255,255,255,0.05) !important; }
            td::before { content: attr(data-label); color: var(--text-dim); font-size: 12px; }
        }
    </style>
</head>
<body>

<div id="loader">⚙️ 資料同步中...</div>

<div id="reportModal" class="modal">
    <div class="modal-content">
        <h3 style="color:var(--primary); margin-top:0;">🚩 狀態回報</h3>
        <div style="margin-bottom:15px;">
            <label style="font-size:11px; color:var(--text-dim);">回報類型</label>
            <select id="reportType" class="btn">
                <option value="報廢">報廢</option><option value="異常">異常</option><option value="正常">正常</option><option value="移位">移位</option>
            </select>
        </div>
        <div style="margin-bottom:15px;">
            <label style="font-size:11px; color:var(--text-dim);">原因說明</label>
            <input type="text" id="reportReason" class="btn" placeholder="說明回報內容...">
        </div>
        <div style="display:flex; gap:12px; margin-top:25px;">
            <button class="btn-main" style="background:#475569; flex:1;" onclick="closeModal('reportModal')">取消</button>
            <button class="btn-main" style="flex:1;" onclick="submitReport()">提交</button>
        </div>
    </div>
</div>

<div id="welcome-page" style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <h1>倉儲控管系統 <span style="color:var(--primary)">V18.3</span></h1>
    <button class="btn-main" style="padding: 20px 80px; border-radius:50px;" onclick="enterSystem()">啟動系統</button>
</div>

<div class="container" id="main-container">
    <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="margin:0;">📦 庫位狀態</h2>
        <div class="header-actions" style="display:flex; gap:10px; align-items:center;">
            <a href="https://mingfonglpg-bit.github.io/-/count.html" target="_blank" class="btn-main" style="background:#1e293b;">🔍 查詢庫存量</a>
            <button id="viewToggle" onclick="toggleViewMode()" class="btn-main" style="background:rgba(16, 185, 129, 0.15); color:var(--edit); border: 1px solid var(--edit);">📱 精簡模式</button>
            <div id="usageInfo" class="usage-badge">使用率: --%</div>
            <button onclick="refreshData()" class="btn-main" style="background:#334155;">🔄 刷新</button>
            <button onclick="toggleAdmin()" class="btn-main" style="background:rgba(167,139,250,0.1); color:#a78bfa;">🛠️ 管理員</button>
        </div>
    </header>

    <section style="background: rgba(255,255,255,0.02); padding: 20px; border-radius: 24px; border: 1px solid var(--border);">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <b id="mapTitle" style="color:var(--primary);">載入中...</b>
            <div style="display:flex; gap:8px;">
                <select id="vZone" onchange="renderVisual()" class="btn" style="width:120px;"><option value="極冷庫-左">極冷庫-左</option><option value="極冷庫-右">極冷庫-右</option><option value="冷藏庫-左">冷藏庫-左</option><option value="冷藏庫-右">冷藏庫-右</option><option value="常溫區">常溫區</option></select>
                <select id="vFloor" onchange="renderVisual()" class="btn" style="width:75px;"><option value="1F">1F</option><option value="2F">2F</option><option value="3F">3F</option><option value="4F">4F</option></select>
            </div>
        </div>
        <div id="visualGrid" style="display:grid; gap:8px;"></div>
    </section>

    <div class="search-wrapper">
        <input type="text" id="searchInput" class="btn" style="height: 55px; padding-right: 50px;" placeholder="🔍 快速搜尋產品、儲位、批號..." oninput="handleSearchInput()">
        <button id="clearSearch" class="search-clear" onclick="clearSearch()">✕</button>
    </div>

    <div style="overflow-x:auto;">
        <table>
            <thead id="tableHead"><tr><th>儲位</th><th>產品</th><th>效期</th><th>批號</th><th>功能</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <div id="paginationCtrl" class="pagination"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwGRptsGHH3MLrl4eU0UsCQ4lvxGE5goP3VF_FntVevNrG31h8VtXhjoYSpO56IYA_T/exec"; 
    const _KEY = "YWRtaW4xMjM="; 
    let inventory = [], zoneConfigs = {}, isAdmin = false, currentId = null;
    let currentPage = 1, rowsPerPage = 10, isCompactMode = false;

    window.onload = () => {
        const cache = localStorage.getItem('inv_cache');
        if(cache) { const d = JSON.parse(cache); inventory = d.inventory; zoneConfigs = d.configs; renderAll(); }
    };

    function enterSystem() { document.getElementById('welcome-page').style.display='none'; document.getElementById('main-container').style.display='block'; refreshData(); }

    async function refreshData() {
        toggleLoader(true);
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            inventory = data.inventory; zoneConfigs = data.configs;
            localStorage.setItem('inv_cache', JSON.stringify(data));
            renderAll();
        } catch (e) { console.error("Sync error"); }
        toggleLoader(false);
    }

    function handleSearchInput() {
        const input = document.getElementById('searchInput');
        document.getElementById('clearSearch').style.display = input.value ? 'flex' : 'none';
        currentPage = 1; renderTable();
    }

    function clearSearch() {
        document.getElementById('searchInput').value = '';
        document.getElementById('clearSearch').style.display = 'none';
        currentPage = 1; renderTable();
    }

    const getZoneColor = z => ({"極冷庫-左":"#38bdf8","極冷庫-右":"#818cf8","冷藏庫-左":"#fbbf24","冷藏庫-右":"#fb7185","常溫區":"#34d399"}[z] || "#6366f1");

    function renderVisual() {
        const grid = document.getElementById('visualGrid'), zone = document.getElementById('vZone').value, floor = document.getElementById('vFloor').value;
        const config = zoneConfigs[zone] || { maxPos: 22, cols: 11 };
        document.getElementById('mapTitle').innerText = `${zone} - ${floor}`;
        grid.style.gridTemplateColumns = `repeat(${config.cols}, 1fr)`;
        grid.innerHTML = '';
        
        const posMap = {};
        inventory.forEach(i => { if(i.zone === zone && i.floor === floor) (posMap[i.pos] = posMap[i.pos] || []).push(i); });

        for (let i = 1; i <= config.maxPos; i++) {
            const items = posMap[i] || [];
            const slot = document.createElement('div');
            let sClass = '', style = '';
            if (items.length > 0) {
                sClass = 'occupied';
                style = `background: ${getZoneColor(zone)};`;
                const n = items.map(it => it.name + it.note).join("");
                if (n.includes("報廢")) sClass = 'status-danger';
                else if (n.includes("異常")) sClass = 'status-warning';
                else if (n.includes("(切)")) sClass = 'status-cut';
            }
            slot.className = `slot ${sClass}`;
            if(style && !sClass.includes('status')) slot.setAttribute('style', style);
            slot.innerHTML = `<b>${i}</b>`;
            
            // 修復精確搜尋：使用 [EXACT] 標記或嚴格匹配邏輯
            slot.onclick = () => { 
                const exactPath = `${zone}${floor}-${i}`;
                document.getElementById('searchInput').value = exactPath;
                document.getElementById('clearSearch').style.display = 'flex';
                currentPage = 1;
                renderTable(true); // 傳入 true 代表精確匹配
            };
            grid.appendChild(slot);
        }
        const used = new Set(inventory.filter(i => i.zone === zone).map(i => `${i.floor}-${i.pos}`)).size;
        document.getElementById('usageInfo').innerText = `使用率: ${((used/(config.maxPos*4))*100).toFixed(1)}%`;
    }

    function renderTable(isExact = false) {
        const kw = document.getElementById('searchInput').value.toLowerCase();
        const filtered = inventory.filter(i => {
            const fullPos = `${i.zone}${i.floor}-${i.pos}`.toLowerCase();
            // 如果是地圖點擊的精確匹配，則 fullPos 必須完全等於 kw
            if (isExact) return fullPos === kw;
            // 如果是手動輸入搜尋，則維持模糊搜尋
            return (fullPos + i.name + i.batch + i.note).includes(kw);
        });
        
        const total = Math.ceil(filtered.length / rowsPerPage) || 1;
        const paged = filtered.slice((currentPage-1)*rowsPerPage, currentPage*rowsPerPage);
        
        document.getElementById('tableHead').style.display = isCompactMode ? 'none' : '';
        document.getElementById('tableBody').innerHTML = paged.map(i => {
            const zColor = getZoneColor(i.zone);
            if (isCompactMode) {
                return `<tr><td data-label="產品"><b>${i.name}</b>${i.note ? `<span class="report-label">⚠️ ${i.note}</span>` : ''}</td><td data-label="儲位"><b style="color:${zColor}">${i.floor}-${i.pos}</b></td><td data-label="操作"><button class="btn-main" style="background:#475569; width:100%; justify-content:center;" onclick="openReport('${i.id}')">回報</button></td></tr>`;
            } else {
                return `<tr><td data-label="儲位"><b style="color:${zColor}">${i.floor}-${i.pos}</b><small>${i.zone}</small></td><td data-label="產品"><b>${i.name}</b>${i.note ? `<span class="report-label">⚠️ ${i.note}</span>` : ''}</td><td data-label="有效日期">${i.date?i.date.split('T')[0]:'-'}</td><td data-label="批號"><code>${i.batch}</code></td><td data-label="功能"><div style="display:flex; gap:5px;"><button class="btn-main" style="background:#475569; padding:6px 10px;" onclick="openReport('${i.id}')">回報</button>${isAdmin ? `<button class="btn-main" style="background:var(--danger); padding:6px 10px;" onclick="deleteItem('${i.id}')">刪除</button>` : ''}</div></td></tr>`;
            }
        }).join('') || '<tr><td colspan="5" style="text-align:center; padding:30px;">無資料</td></tr>';

        document.getElementById('paginationCtrl').innerHTML = total > 1 ? `<button class="page-btn" onclick="changePage(-1)" ${currentPage===1?'disabled':''}>上一頁</button><span>${currentPage} / ${total}</span><button class="page-btn" onclick="changePage(1)" ${currentPage===total?'disabled':''}>下一頁</button>` : '';
    }

    function renderAll() { renderVisual(); renderTable(); }
    function changePage(step) { currentPage += step; renderTable(); }
    function toggleAdmin() { const p = prompt("金鑰:"); if(p && btoa(p) === _KEY) { isAdmin=!isAdmin; renderTable(); } }
    function openReport(id) { currentId = id; document.getElementById('reportModal').style.display = 'flex'; }
    function closeModal(m) { document.getElementById(m).style.display = 'none'; }
    function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
    async function apiCall(act, body) { toggleLoader(true); await fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify({action:act, ...body})}); refreshData(); }
    function submitReport() { apiCall('report', {id:currentId, type:document.getElementById('reportType').value, reason:document.getElementById('reportReason').value}); closeModal('reportModal'); }
    function deleteItem(id) { if(confirm("確定刪除？")) apiCall('delete', {id}); }
    function toggleViewMode() { isCompactMode = !isCompactMode; document.getElementById('viewToggle').innerText = isCompactMode ? "📖 完整模式" : "📱 精簡模式"; renderTable(); }
</script>
</body>
</html>
