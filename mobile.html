<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ 倉儲庫位控管系統 V24.3 視覺同步行動版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { 
            --primary: #6366f1; --warning: #f59e0b; --danger: #ef4444; --edit: #10b981; --marked: #a855f7;
            --task-color: #d9f99d; --restock: #06b6d4;
            --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc; --text-dim: #94a3b8; --border: rgba(255, 255, 255, 0.1);
            --color-cold: #3b82f6; --color-chill: #0ea5e9; --color-ambient: #94a3b8;
            --stat-num: #fbbf24;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Inter', "Noto Sans TC", sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0; 
            font-size: 14px;
            overflow-x: hidden;
        }
        
        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
            background: var(--card-bg); 
            backdrop-filter: blur(20px); 
            padding: 16px; 
            border-radius: 0px; 
            border: none; 
            display: none; 
        }
        @media (min-width: 768px) {
            .container { margin: 20px auto; padding: 40px; border-radius: 28px; border: 1px solid var(--border); }
        }
        
        .dashboard { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
            margin-bottom: 25px; 
        }
        @media (min-width: 900px) {
            .dashboard { grid-template-columns: repeat(5, 1fr); gap: 15px; }
        }
        
        .stat-card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid var(--border); 
            padding: 15px 10px; 
            border-radius: 20px; 
            text-align: center; 
            cursor: pointer; 
            user-select: none; 
            transition: all 0.2s ease; 
            position: relative; 
        }
        
        .card-close-btn { 
            position: absolute; 
            top: 6px; 
            right: 6px; 
            color: var(--text-dim); 
            font-size: 14px; 
            padding: 8px;
            cursor: pointer; 
            z-index: 10; 
        }
        
        .stat-value { font-size: 26px; font-weight: 800; color: var(--edit); margin: 6px 0; }
        .floor-detail { font-size: 11px; color: var(--text-dim); line-height: 1.6; border-top: 1px solid var(--border); padding-top: 6px; margin-top: 6px; }
        .stat-num-highlight { color: var(--stat-num); font-weight: bold; }

        /* 👑 六個按鈕專屬外觀與專屬霓虹特效樣式設定 */
        .header-tools { 
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 20px; 
        }
        @media (min-width: 768px) {
            .header-tools { display: flex; flex-wrap: wrap; gap: 10px; }
        }
        
        .btn-main { 
            padding: 12px 14px; 
            border-radius: 12px; 
            border: 1px solid transparent; 
            color: white; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 14px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            gap: 6px;
        }
        .btn-main:active { transform: scale(0.95); opacity: 0.9; }

        /* 六色預設基底 */
        #warningBtn { background: #d97706; } /* 琥珀金 */
        #markBtn { background: #7c3aed; }    /* 霓虹紫 */
        #exportBtn { background: #059669; }  /* 翡翠綠 */
        #logBtn { background: #2563eb; }     /* 寶石藍 */
        #adminPanelBtn { background: #4b5563; } /* 石墨灰 */
        #adminLoginBtn { background: #dc2626; } /* 火焰紅 */

        /* 👑 按了之後的變色與特效（啟用狀態/點擊瞬間反饋） */
        #warningBtn.active, #warningBtn:focus { background: #f59e0b; box-shadow: 0 0 15px #f59e0b; border-color: #fff; }
        #markBtn.active, #markBtn:focus { background: #a855f7; box-shadow: 0 0 15px #a855f7; border-color: #fff; }
        #exportBtn:focus { background: #10b981; box-shadow: 0 0 15px #10b981; border-color: #fff; }
        #logBtn:focus { background: #3b82f6; box-shadow: 0 0 15px #3b82f6; border-color: #fff; }
        #adminPanelBtn.active, #adminPanelBtn:focus { background: #6b7280; box-shadow: 0 0 15px #6b7280; border-color: #fff; }
        #adminLoginBtn.active, #adminLoginBtn:focus { background: #ef4444; box-shadow: 0 0 15px #ef4444; border-color: #fff; }

        .map-section { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .visual-grid { 
            display: grid; 
            gap: 6px; 
            grid-template-columns: repeat(6, 1fr); 
        }
        @media (min-width: 768px) {
            .visual-grid { grid-template-columns: repeat(11, 1fr); gap: 8px; }
        }
        
        .slot { 
            aspect-ratio: 1; 
            border-radius: 10px; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            font-size: 12px; 
            font-weight: bold; 
            transition: 0.2s; 
            color: var(--text-dim); 
            position: relative;
            min-height: 44px;
        }
        .slot.occupied { background: var(--primary); color: white; }
        .slot.status-danger { background: var(--danger) !important; color: white; box-shadow: 0 0 8px var(--danger); }
        .slot.status-warning { background: var(--warning) !important; color: white; }
        .slot.status-task { background: var(--task-color) !important; color: #1e293b !important; }
        .slot.status-marked { background: var(--marked) !important; box-shadow: 0 0 12px var(--marked); border: 2px solid white; color: white !important; z-index: 5; transform: scale(1.02); }
        .slot.has-note::after { content: ''; position: absolute; top: 4px; right: 4px; width: 6px; height: 6px; background: white; border-radius: 50%; }

        .focus-warning .slot:not(.status-danger):not(.status-warning) { opacity: 0.15; filter: grayscale(0.9); }
        .focus-marked .slot:not(.status-marked) { opacity: 0.15; filter: grayscale(0.9); }

        .search-wrapper { position: relative; width: 100%; margin-bottom: 20px; }
        .search-input { width: 100%; padding: 14px 45px 14px 16px; border-radius: 14px; border: 1px solid var(--border); background: #1e293b; color: white; font-size: 15px; box-sizing: border-box; }
        .search-clear { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-dim); font-size: 20px; padding: 4px; }

        .card-list-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 16px;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.2s ease, max-height 0.3s ease, margin 0.3s ease, padding 0.3s ease;
            touch-action: pan-y; 
            max-height: 300px;
            opacity: 1;
        }
        
        .info-card.swiped-out {
            opacity: 0 !important;
            max-height: 0 !important;
            padding-top: 0 !important;
            padding-bottom: 0 !important;
            margin-top: 0 !important;
            margin-bottom: -12px !important;
            border-color: transparent !important;
            transform: translateX(100vw) !important; 
            pointer-events: none;
        }
        .info-card.swiped-out-left {
            transform: translateX(-100vw) !important;
        }
        
        .in-mark-mode .info-card, .in-mark-mode tbody tr {
            cursor: pointer !important;
        }
        
        .info-card.card-selected {
            border: 2px solid #c084fc !important;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.6);
            background: rgba(168, 85, 247, 0.1) !important;
            transform: scale(1.01);
        }
        
        tr.row-selected td {
            background: rgba(168, 85, 247, 0.15) !important;
            border-top: 1px solid #c084fc !important;
            border-bottom: 1px solid #c084fc !important;
        }

        .card-sort-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.15);
            padding: 10px 14px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }
        
        .card-sort-select {
            background: #1e293b;
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 8px 32px 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            outline: none;
            cursor: pointer;
        }

        @media (max-width: 767px) {
            .responsive-table-view { display: none; }
            .responsive-card-view { display: block; }
        }
        @media (min-width: 768px) {
            .responsive-table-view { display: block; }
            .responsive-card-view { display: none; }
            
            table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
            th { cursor: pointer; padding: 12px; color: var(--text-dim); text-align: left; }
            tr td { background: rgba(255, 255, 255, 0.03); padding: 15px; border-top: 1px solid var(--border); font-size: 15px; transition: all 0.2s; }
            tr:hover td { background: rgba(255, 255, 255, 0.06); }
        }

        .pos-badge { padding: 5px 10px; border-radius: 8px; font-weight: 900; color: white; display: inline-block; font-size: 12px; text-align: center; }
        .bg-cold { background: var(--color-cold); }
        .bg-chill { background: var(--color-chill); }
        .bg-ambient { background: var(--color-ambient); color: #0f172a; }

        .scrapped-text { text-decoration: line-through; opacity: 0.5; }

        .modal { display: none; position: fixed; z-index: 200; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); padding: 12px; box-sizing: border-box; }
        .modal-content { 
            background: #1e293b; 
            margin: 10% auto; 
            padding: 22px; 
            border-radius: 24px; 
            width: 100%; 
            max-width: 400px; 
            border: 1px solid var(--primary); 
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-content input, .modal-content textarea, .modal-content select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid var(--border); background: #0f172a; color: white; font-size: 15px; box-sizing: border-box; }
        
        .action-btn { padding: 8px 12px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; margin: 2px; font-weight: bold; color: white; display: inline-flex; align-items: center; min-height: 35px; }
        
        select { -webkit-appearance: none; appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' fill='white'><polygon points='0,0 10,0 5,5'/></svg>"); background-repeat: no-repeat; background-position: right 12px center; padding-right: 30px !important; }
    </style>
</head>
<body>

<div id="welcome-page" style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center;">
    <h1 style="font-size: 30px; margin-bottom: 5px;">倉儲庫位控管系統</h1>
    <h2 style="color:var(--primary); font-size: 36px; margin: 0 0 10px 0;">V24.3</h2>
    <p style="color:var(--text-dim); margin-bottom: 30px; font-size: 16px;">行動端優化版</p>
    <button class="btn-main" style="width: 220px; padding: 16px; font-size: 16px;" onclick="enterSystem()">啟動系統</button>
</div>

<div id="itemModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle" style="margin-top:0; font-size: 18px;">資料管理</h3>
        <input type="hidden" id="editId">
        <div id="posFields" style="background: rgba(255,255,255,0.04); padding: 12px; border-radius: 12px; margin-bottom: 10px;">
            <label style="font-size: 11px; color: var(--text-dim); display: block; margin-bottom: 4px;">儲位配置</label>
            <div style="display: flex; flex-direction: column; gap: 6px;">
                <select id="mZone"><option value="極冷庫-左">極冷庫-左</option><option value="極冷庫-右">極冷庫-右</option><option value="冷藏庫-左">冷藏庫-左</option><option value="冷藏庫-右">冷藏庫-右</option><option value="常溫區">常溫區</option></select>
                <div style="display: flex; gap: 6px;">
                    <select id="mFloor" style="margin:0;"><option value="1F">1F</option><option value="2F">2F</option><option value="3F">3F</option><option value="4F">4F</option></select>
                    <input type="number" id="mPos" placeholder="編號(1-22)" style="margin:0;">
                </div>
            </div>
        </div>
        <div id="editFields">
            <input type="text" id="mName" placeholder="品名">
            <input type="text" id="mBatch" placeholder="批號">
            <input type="date" id="mDate">
        </div>
        <div id="reportFields" style="display:none;">
            <select id="mStatusType">
                <option value="">-- 選擇作業狀態 --</option>
                <option value="異常">異常</option><option value="移位">移位</option><option value="出清">出清</option><option value="盤點">盤點</option><option value="查貨">查貨</option><option value="報廢">報廢</option>
            </select>
            <textarea id="mNote" placeholder="詳細備註說明..." rows="3"></textarea>
        </div>
        <div style="display:flex; justify-content: space-between; margin-top:20px; gap: 10px;">
            <button class="btn-main" style="background:#4b5563; flex: 1;" onclick="closeModal()">關閉</button>
            <button class="btn-main" style="flex: 1;" onclick="saveData()">儲存資料</button>
        </div>
    </div>
</div>

<div class="container" id="main-container">
    <div class="dashboard">
        <div class="stat-card" id="card-極冷庫-左" onclick="toggleCardDetail('極冷庫-左')">
            <span class="card-close-btn" onclick="closeStatCard(event, '極冷庫-左')">✖</span>
            <div style="font-size:12px;">極冷左空位 <span id="arrow-極冷庫-escape">▼</span></div>
            <div id="empty-極冷庫-左" class="stat-value">--</div>
            <div id="detail-極冷庫-左" class="floor-detail"></div>
        </div>
        <div class="stat-card" id="card-極冷庫-右" onclick="toggleCardDetail('極冷庫-右')">
            <span class="card-close-btn" onclick="closeStatCard(event, '極冷庫-右')">✖</span>
            <div style="font-size:12px;">極冷右空位 <span id="arrow-極冷庫-右">▼</span></div>
            <div id="empty-極冷庫-右" class="stat-value">--</div>
            <div id="detail-極冷庫-右" class="floor-detail"></div>
        </div>
        <div class="stat-card" id="card-冷藏庫-text-left" onclick="toggleCardDetail('冷藏庫-左')">
            <span class="card-close-btn" onclick="closeStatCard(event, '冷藏庫-左')">✖</span>
            <div style="font-size:12px;">冷藏左空位 <span id="arrow-冷藏庫-左">▼</span></div>
            <div id="empty-冷藏庫-左" class="stat-value">--</div>
            <div id="detail-冷藏庫-左" class="floor-detail"></div>
        </div>
        <div class="stat-card" id="card-冷藏庫-右" onclick="toggleCardDetail('冷藏庫-右')">
            <span class="card-close-btn" onclick="closeStatCard(event, '冷藏庫-右')">✖</span>
            <div style="font-size:12px;">冷藏右空位 <span id="arrow-冷藏庫-右">▼</span></div>
            <div id="empty-冷藏庫-右" class="stat-value">--</div>
            <div id="detail-冷藏庫-右" class="floor-detail"></div>
        </div>
        <div class="stat-card" id="card-常溫區" style="grid-column: span 2;" onclick="toggleCardDetail('常溫區')">
            <span class="card-close-btn" onclick="closeStatCard(event, '常溫區')">✖</span>
            <div style="font-size:12px;">常溫區空位 <span id="arrow-常溫區">▼</span></div>
            <div id="empty-常溫區" class="stat-value">--</div>
            <div id="detail-常溫區" class="floor-detail"></div>
        </div>
    </div>

    <header class="header-tools">
        <button id="warningBtn" onclick="toggleWarningMode()" class="btn-main">🕒 即期預警</button>
        <button id="markBtn" onclick="toggleMarkMode()" class="btn-main">📍 標記模式</button>
        <button id="exportBtn" onclick="exportExcel()" class="btn-main">💾 匯出 Excel</button>
        <button id="logBtn" onclick="exportActionLogs()" class="btn-main">📋 行為日誌</button>
        <button id="adminPanelBtn" onclick="toggleAdminPanel()" class="btn-main">🛠️ 維護管理</button>
        <button id="adminLoginBtn" onclick="adminLogin()" class="btn-main">🔐 管理模式</button>
    </header>

    <div id="admin-panel" style="display:none; margin-bottom:20px; background:rgba(255,255,255,0.04); padding:16px; border-radius:16px; border: 1px solid var(--border);">
        <div style="display:flex; flex-direction:column; gap:10px;">
            <button onclick="document.getElementById('xlsxFile').click()" class="btn-main" style="width:100%; background: #0ea5e9;">📂 匯入儲位 Excel</button>
            <button id="manualAddBtn" onclick="openBox('add')" class="btn-main" style="background:var(--primary); display:none; width:100%;">➕ 手動新增儲位</button>
        </div>
        <input type="file" id="xlsxFile" style="display:none;" onchange="handleFile(this)">
    </div>

    <section class="map-section">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <b style="font-size:15px;">📌 儲位可視化地圖</b>
            <div style="display:flex; gap:6px;">
                <select id="vZone" style="padding:6px 10px; margin:0; font-size:12px;" onchange="renderVisual()"><option value="極冷庫-左">極冷庫-左</option><option value="極冷庫-右">極冷庫-右</option><option value="冷藏庫-左">冷藏庫-左</option><option value="冷藏庫-右">冷藏庫-右</option><option value="常溫區">常溫區</option></select>
                <select id="vFloor" style="padding:6px 10px; margin:0; font-size:12px;" onchange="renderVisual()"><option value="1F">1F</option><option value="2F">2F</option><option value="3F">3F</option><option value="4F">4F</option></select>
            </div>
        </div>
        <div id="visualGrid" class="visual-grid"></div>
    </section>

    <div class="search-wrapper">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 全庫快速檢索：品名、批號、儲位..." oninput="onSearch()">
        <span id="clearSearch" class="search-clear" onclick="clearSearch()">✖</span>
    </div>

    <div class="responsive-table-view" id="tableViewContainer">
        <table>
            <thead>
                <tr>
                    <th>儲位</th>
                    <th>品名</th>
                    <th onclick="sortTable('batch')">批號 ↕</th>
                    <th onclick="sortTable('date')">有效日期 ↕</th>
                    <th>備註說明</th>
                    <th>管理操作</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="responsive-card-view" id="cardViewContainer">
        <div class="card-sort-header">
            <span style="font-size: 13px; font-weight: bold; color: var(--text-dim);">資料字卡清單</span>
            <select id="cardSortSelect" class="card-sort-select" onchange="handleCardSelectSort(this.value)">
                <option value="default">↕ 排序方式 (預設)</option>
                <option value="batch-asc">依批號 (由小到大)</option>
                <option value="batch-desc">依批號 (由大到小)</option>
                <option value="date-asc">依效期 (由近到遠)</option>
                <option value="date-desc">依效期 (由遠到近)</option>
            </select>
        </div>
        <div id="cardListBody" class="card-list-container"></div>
    </div>

    <div id="pagination" style="display:flex; justify-content:center; align-items:center; gap:12px; margin-top:20px; margin-bottom: 40px;"></div>
</div>

<script>
    let inventory = [];
    let isWarningMode = false, isMarkMode = false, isAdmin = false;
    let markedPos = new Set();
    let currentSort = { key: '', order: 1 };
    let currentPage = 1, rowsPerPage = 10;
    let hiddenCardDetails = new Set();
    let hiddenCards = new Set();
    let swipedCardIds = new Set(); 
    let actionLogs = [];
    let searchDebounceTimer = null;

    function logAction(actionType, detail) {
        const now = new Date();
        const timestamp = now.getFullYear() + '/' + 
                        (now.getMonth() + 1).toString().padStart(2, '0') + '/' + 
                        now.getDate().toString().padStart(2, '0') + ' ' + 
                        now.getHours().toString().padStart(2, '0') + ':' + 
                        now.getMinutes().toString().padStart(2, '0') + ':' + 
                        now.getSeconds().toString().padStart(2, '0');
        actionLogs.push({ "操作時間": timestamp, "行為類別": actionType, "詳細操作內容": detail });
    }

    function checkDateStatus(item) {
        const note = (item.note || "").trim();
        const name = (item.name || "").trim();
        const d = item.date;
        const diff = d && d !== "-" ? Math.ceil((new Date(d) - new Date().setHours(0,0,0,0)) / 86400000) : 999;
        if (note.includes("報廢") || name.includes("報廢")) return 3; 
        if (d !== "-" && diff < 0) return 2; 
        if (note.match(/異常|移位|出清|盤點|查貨/)) return 4; 
        if (d !== "-" && diff <= 30) return 1; 
        return 0;
    }

    function enterSystem() {
        document.getElementById('welcome-page').style.display = 'none';
        document.getElementById('main-container').style.display = 'block';
        const saved = localStorage.getItem('offlineData_V23_7');
        if(saved) { inventory = JSON.parse(saved); }
        renderAll();
    }

    function renderVisual() {
        const z = document.getElementById('vZone').value, f = document.getElementById('vFloor').value;
        const grid = document.getElementById('visualGrid'); 
        grid.innerHTML = '';
        grid.className = 'visual-grid' + (isWarningMode ? ' focus-warning' : '') + (isMarkMode ? ' focus-marked' : '');
        
        for (let i = 1; i <= 22; i++) {
            const full = `${z}${f}-${i}`;
            const items = inventory.filter(x => x.fullPos === full);
            const slot = document.createElement('div');
            slot.className = 'slot'; 
            
            if (items.length > 0) {
                slot.classList.add('occupied');
                const s = items.map(x => checkDateStatus(x));
                if (s.includes(3) || s.includes(2)) slot.classList.add('status-danger');
                else if (s.includes(4)) slot.classList.add('status-task');
                else if (s.includes(1)) slot.classList.add('status-warning');
                if (items.some(x => (x.note && x.note.trim() !== ""))) slot.classList.add('has-note');
            }
            if (markedPos.has(full)) slot.classList.add('status-marked');
            slot.innerHTML = `<div>${i}</div>`;
            slot.onclick = () => { 
                document.getElementById('searchInput').value = `pos:${full}`; 
                onSearch(); 
            };
            grid.appendChild(slot);
        }
        updateStats();
    }

    function handleItemRowClick(event, fullPos) {
        if (!isMarkMode || event.target.classList.contains('action-btn')) return;
        if (markedPos.has(fullPos)) { markedPos.delete(fullPos); } else { markedPos.add(fullPos); }
        renderVisual();
        renderTable();
    }

    function renderTable() {
        const kw = document.getElementById('searchInput').value.toLowerCase().trim();
        let filtered;
        
        if (isWarningMode) {
            filtered = inventory.filter(x => checkDateStatus(x) === 1);
        } else if (isMarkMode && markedPos.size > 0 && kw === '') {
            filtered = inventory.filter(x => markedPos.has(x.fullPos));
        } else if (kw.startsWith("pos:")) {
            const targetPos = kw.replace("pos:", "");
            filtered = inventory.filter(x => x.fullPos.toLowerCase() === targetPos);
        } else if (kw) {
            filtered = inventory.filter(x => (x.fullPos + x.name + x.batch + (x.note || "")).toLowerCase().includes(kw));
        } else {
            const cz = document.getElementById('vZone').value, cf = document.getElementById('vFloor').value;
            filtered = inventory.filter(x => x.zone === cz && x.floor === cf);
        }
        
        filtered = filtered.filter(x => !swipedCardIds.has(x.id));
        
        if (currentSort.key) {
            filtered.sort((a,b) => (a[currentSort.key] || "").localeCompare(b[currentSort.key] || "", undefined, {numeric:true}) * currentSort.order);
        }
        
        const totalPages = Math.ceil(filtered.length / rowsPerPage) || 1;
        if (currentPage > totalPages) currentPage = totalPages;

        const data = filtered.slice((currentPage - 1) * rowsPerPage, currentPage * rowsPerPage);

        const listContainer = document.getElementById('cardListBody');
        const tableContainer = document.getElementById('tableBody');
        
        if(isMarkMode) {
            document.getElementById('tableViewContainer').classList.add('in-mark-mode');
            document.getElementById('cardViewContainer').classList.add('in-mark-mode');
        } else {
            document.getElementById('tableViewContainer').classList.remove('in-mark-mode');
            document.getElementById('cardViewContainer').classList.remove('in-mark-mode');
        }

        // 1. 桌機版表格輸出
        tableContainer.innerHTML = data.map(i => {
            const s = checkDateStatus(i);
            const isScrapped = (s === 3); 
            const isSelected = markedPos.has(i.fullPos);
            const colorClass = i.fullPos.includes('極冷') ? 'bg-cold' : (i.fullPos.includes('冷藏') ? 'bg-chill' : 'bg-ambient');
            return `<tr class="${isSelected ? 'row-selected' : ''}" onclick="handleItemRowClick(event, '${i.fullPos}')">
                <td><span class="pos-badge ${colorClass}">${i.fullPos}</span></td>
                <td class="${isScrapped ? 'scrapped-text' : ''}">${i.name}</td>
                <td>${i.batch}</td>
                <td style="${s===1?'color:var(--warning);font-weight:bold':(s===2?'color:var(--danger);font-weight:bold':'')}">${i.date}</td>
                <td class="${isScrapped ? 'scrapped-text' : ''}" style="${s===3?'color:var(--danger);font-weight:bold':(s===4?'color:var(--task-color);font-weight:bold':'')}">${i.note || "-"}</td>
                <td>
                    <button class="action-btn" style="background:var(--restock)" onclick="findRestock(${i.id})">🔍 補貨</button>
                    <button class="action-btn" style="background:#4b5563" onclick="openBox('report', ${i.id})">回報</button>
                    ${isAdmin ? `<button class="action-btn" style="background:var(--edit)" onclick="openBox('edit', ${i.id})">✎</button>
                    <button class="action-btn" style="background:var(--danger)" onclick="deleteItem(${i.id})">🗑️</button>` : ''}
                </td>
            </tr>`;
        }).join('');

        // 2. 手機版字卡輸出
        listContainer.innerHTML = data.map(i => {
            const s = checkDateStatus(i);
            const isScrapped = (s === 3); 
            const isSelected = markedPos.has(i.fullPos);
            const colorClass = i.fullPos.includes('極冷') ? 'bg-cold' : (i.fullPos.includes('冷藏') ? 'bg-chill' : 'bg-ambient');
            return `<div class="info-card ${isSelected ? 'card-selected' : ''}" data-id="${i.id}" onclick="handleItemRowClick(event, '${i.fullPos}')">
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); padding-bottom:8px;">
                    <span class="pos-badge ${colorClass}">${i.fullPos}</span>
                    <span style="font-size:12px; color:var(--text-dim);">批號: <b>${i.batch}</b></span>
                </div>
                <div style="font-size:15px; font-weight:bold;" class="${isScrapped ? 'scrapped-text' : ''}">${i.name}</div>
                <div style="font-size:13px; display:flex; justify-content:space-between;">
                    <span>有效日期: <b style="${s===1?'color:var(--warning)':(s===2?'color:var(--danger)':'')}">${i.date}</b></span>
                </div>
                <div style="font-size:13px; background:rgba(0,0,0,0.2); padding:6px 10px; border-radius:8px; color:var(--text-dim);" class="${isScrapped ? 'scrapped-text' : ''}">
                    備註說明: <span style="${s===3?'color:var(--danger);font-weight:bold':(s===4?'color:var(--task-color);font-weight:bold':'')}">${i.note || "-"}</span>
                </div>
                <div style="display:flex; justify-content:flex-end; gap:2px; margin-top:4px;">
                    <button class="action-btn" style="background:var(--restock)" onclick="findRestock(${i.id})">🔍 補貨</button>
                    <button class="action-btn" style="background:#4b5563" onclick="openBox('report', ${i.id})">回報</button>
                    ${isAdmin ? `<button class="action-btn" style="background:var(--edit)" onclick="openBox('edit', ${i.id})">✎</button>
                    <button class="action-btn" style="background:var(--danger)" onclick="deleteItem(${i.id})">🗑️</button>` : ''}
                </div>
            </div>`;
        }).join('');

        document.getElementById('pagination').innerHTML = `
            <button class="btn-main" style="padding:8px 14px;" onclick="changeP(-1, ${totalPages})">上一頁</button> 
            <span style="margin:0 10px; font-weight:bold;">${currentPage} / ${totalPages}</span> 
            <button class="btn-main" style="padding:8px 14px;" onclick="changeP(1, ${totalPages})">下一頁</button>
        `;

        bindSwipeEvents();
    }

    function bindSwipeEvents() {
        const cards = document.querySelectorAll('.info-card');
        cards.forEach(card => {
            let startX = 0, startY = 0, moveX = 0, isSwiping = false;

            card.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                isSwiping = true;
                card.style.transition = 'none';
            }, { passive: true });

            card.addEventListener('touchmove', (e) => {
                if (!isSwiping) return;
                moveX = e.touches[0].clientX - startX;
                let moveY = e.touches[0].clientY - startY;

                if (Math.abs(moveY) > Math.abs(moveX) && Math.abs(moveX) < 10) {
                    isSwiping = false;
                    card.style.transform = '';
                    return;
                }
                card.style.transform = `translateX(${moveX}px)`;
                card.style.opacity = (1 - Math.abs(moveX) / 300).toString();
            }, { passive: true });

            card.addEventListener('touchend', () => {
                if (!isSwiping) return;
                isSwiping = false;
                card.style.transition = 'all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94)';

                if (Math.abs(moveX) > 100) {
                    const itemId = parseInt(card.getAttribute('data-id'));
                    if (moveX > 0) {
                        card.classList.add('swiped-out');
                    } else {
                        card.classList.add('swiped-out', 'swiped-out-left');
                    }
                    setTimeout(() => {
                        swipedCardIds.add(itemId);
                        renderTable();
                    }, 200);
                } else {
                    card.style.transform = '';
                    card.style.opacity = '1';
                }
                moveX = 0;
            });
        });
    }

    function changeP(step, maxPages) { 
        currentPage = Math.max(1, Math.min(maxPages, currentPage + step)); 
        renderTable(); 
    }

    function handleCardSelectSort(val) {
        if (val === 'default') { currentSort.key = ''; currentSort.order = 1; } 
        else if (val === 'batch-asc') { currentSort.key = 'batch'; currentSort.order = 1; } 
        else if (val === 'batch-desc') { currentSort.key = 'batch'; currentSort.order = -1; } 
        else if (val === 'date-asc') { currentSort.key = 'date'; currentSort.order = 1; } 
        else if (val === 'date-desc') { currentSort.key = 'date'; currentSort.order = -1; }
        currentPage = 1; 
        renderTable();
    }

    function findRestock(id) {
        const currentItem = inventory.find(x => x.id === id);
        if (!currentItem || !currentItem.name) return;
        const currentZoneType = currentItem.zone.split('-')[0];
        const matches = inventory.filter(x => {
            const matchZoneType = x.zone.split('-')[0];
            return x.name === currentItem.name && x.id !== id && matchZoneType === currentZoneType;
        });
        if (matches.length > 0) {
            const posList = matches.map(x => x.fullPos).join(', ');
            currentItem.note = currentItem.note ? `${currentItem.note} | 同凍庫儲位: ${posList}` : `同凍庫儲位: ${posList}`;
            logAction("補貨查詢", `查詢品項 [${currentItem.name}]。聯動儲位為: ${posList}`);
            alert(`已找到屬【${currentZoneType}】的 ${matches.length} 個同名品項，已更新備註！`);
            saveDataLocal();
        } else {
            alert(`在【${currentZoneType}】中未找到其他相同品項。`);
        }
    }

    function toggleCardDetail(zoneName) {
        const arrowEl = document.getElementById(`arrow-${zoneName}`);
        const detailEl = document.getElementById(`detail-${zoneName}`);
        if (hiddenCardDetails.has(zoneName)) {
            hiddenCardDetails.delete(zoneName);
            if(detailEl) detailEl.style.display = 'block';
            if(arrowEl) arrowEl.innerText = '▼';
        } else {
            hiddenCardDetails.add(zoneName);
            if(detailEl) detailEl.style.display = 'none';
            if(arrowEl) arrowEl.innerText = '▶';
        }
    }

    function closeStatCard(event, zoneName) {
        event.stopPropagation();
        hiddenCards.add(zoneName); 
        const targetId = zoneName === "冷藏庫-左" ? "card-冷藏庫-text-left" : `card-${zoneName}`;
        const cardEl = document.getElementById(targetId);
        if(cardEl) cardEl.style.display = 'none';
    }

    /* 👑 預警切換：同步控制 active 類別以顯示霓虹外框 */
    function toggleWarningMode() { 
        isWarningMode = !isWarningMode; 
        const btn = document.getElementById('warningBtn');
        if (isWarningMode) {
            btn.classList.add('active');
            isMarkMode = false; 
            document.getElementById('markBtn').classList.remove('active');
        } else {
            btn.classList.remove('active');
        }
        currentPage = 1;
        renderAll(); 
    }
    
    /* 👑 標記切換：同步控制 active 類別以顯示霓虹外框 */
    function toggleMarkMode() { 
        isMarkMode = !isMarkMode; 
        const btn = document.getElementById('markBtn');
        if (isMarkMode) { 
            btn.classList.add('active');
            isWarningMode = false; 
            document.getElementById('warningBtn').classList.remove('active');
        } else {
            btn.classList.remove('active');
            logAction("標記篩選", `使用者篩選並觀看標記的 ${markedPos.size} 個庫位`);
        } 
        currentPage = 1;
        renderAll(); 
    }
    
    function deleteItem(id) { 
        const target = inventory.find(x => x.id === id);
        if(!target) return;
        if(confirm("確定刪除此儲位資料？")) { 
            logAction("刪除", `移除儲位貨品數據 -> 儲位: ${target.fullPos} | 品名: [${target.name || '無'}]`);
            inventory = inventory.filter(x => x.id !== id); 
            saveDataLocal(); 
        } 
    }
    
    function openBox(type, id) {
        const item = id ? inventory.find(x => x.id === id) : {zone:document.getElementById('vZone').value, floor:document.getElementById('vFloor').value, pos:'', name:'', batch:'', date:'', note:''};
        document.getElementById('itemModal').style.display = 'block';
        document.getElementById('editId').value = id || '';
        document.getElementById('mZone').value = item.zone; document.getElementById('mFloor').value = item.floor; document.getElementById('mPos').value = item.pos;
        document.getElementById('mName').value = item.name; document.getElementById('mBatch').value = item.batch; document.getElementById('mDate').value = item.date;
        document.getElementById('mNote').value = item.note || "";
        const isReport = (type === 'report');
        document.getElementById('mPos').readOnly = isReport;
        document.getElementById('editFields').style.display = isReport ? 'none' : 'block';
        document.getElementById('reportFields').style.display = isReport ? 'block' : 'none';
        document.getElementById('modalTitle').innerText = (type==='edit'?'編輯資料':(type==='add'?'手動新增儲位':'異常回報'));
        document.getElementById('mStatusType').value = "";
    }

    function saveData() {
        const id = document.getElementById('editId').value;
        const isReportMode = document.getElementById('reportFields').style.display === 'block';
        const entry = {
            id: id ? parseInt(id) : Date.now(),
            zone: document.getElementById('mZone').value, 
            floor: document.getElementById('mFloor').value, 
            pos: document.getElementById('mPos').value,
            name: document.getElementById('mName').value, 
            batch: document.getElementById('mBatch').value, 
            date: document.getElementById('mDate').value, 
            note: document.getElementById('mNote').value
        };
        entry.fullPos = `${entry.zone}${entry.floor}-${entry.pos}`;
        
        let logType = "修改"; let logDetail = "";
        if (isReportMode) {
            const st = document.getElementById('mStatusType').value;
            if(st) entry.note = `[${st}] ${entry.note}`;
            logType = "回報"; logDetail = `狀態變更 -> 儲位: ${entry.fullPos} | 備註: ${entry.note}`;
        } else {
            if(!id) {
                logType = "新增"; logDetail = `手動新增 -> 儲位: ${entry.fullPos} | 品名: [${entry.name}]`;
            } else {
                logType = "修改"; logDetail = `更新儲位 -> 儲位: ${entry.fullPos} | 品名: [${entry.name}]`;
            }
        }
        logAction(logType, logDetail);
        if(id) {
            let index = inventory.findIndex(x=>x.id==id);
            if(index !== -1) inventory[index] = entry;
        } else {
            inventory.push(entry);
        }
        closeModal(); saveDataLocal();
    }

    /* 👑 管理模式登入：同步控制 active 狀態及文字顯示 */
    function adminLogin() { 
        const btn = document.getElementById('adminLoginBtn');
        if (!isAdmin) { 
            const pw = prompt("密碼:"); 
            if (pw === "admin123") {
                isAdmin = true; 
                btn.classList.add('active');
            } else return; 
        } else { 
            isAdmin = false; 
            btn.classList.remove('active');
        } 
        btn.innerText = isAdmin ? "🔓 管理中" : "🔐 管理模式"; 
        document.getElementById('manualAddBtn').style.display = isAdmin ? 'inline-block' : 'none'; 
        renderTable(); 
    }
    
    /* 👑 維護管理面板切換：控制面板按鈕 active 類別 */
    function toggleAdminPanel() { 
        const p = document.getElementById('admin-panel'); 
        const btn = document.getElementById('adminPanelBtn');
        if(p.style.display === 'none') {
            p.style.display = 'block';
            btn.classList.add('active');
        } else {
            p.style.display = 'none';
            btn.classList.remove('active');
        }
    }

    function updateStats() {
        const zones = ["極冷庫-左", "極冷庫-右", "冷藏庫-left", "冷藏庫-右", "常溫區"];
        zones.forEach(z => {
            const domId = z === "冷藏庫-left" ? "冷藏庫-左" : z;
            const targetCardId = domId === "冷藏庫-左" ? "card-冷藏庫-text-left" : `card-${domId}`;
            const cardEl = document.getElementById(targetCardId);
            if (hiddenCards.has(domId)) { if (cardEl) cardEl.style.display = 'none'; return; } 
            else { if (cardEl) cardEl.style.display = 'block'; }

            let totalOcc = 0; let floorDetails = [];
            ["1F","2F","3F","4F"].forEach(f => { 
                let floorOcc = 0;
                for(let i=1; i<=22; i++) {
                    if(inventory.some(x => x.fullPos === `${domId}${f}-${i}` || x.fullPos === `${z}${f}-${i}`)) { 
                        floorOcc++; totalOcc++; 
                    }
                }
                floorDetails.push(`${f}:<span class="stat-num-highlight">${22 - floorOcc}</span>`);
            });
            
            const targetEmptyEl = document.getElementById(`empty-${domId}`);
            if(targetEmptyEl) targetEmptyEl.innerText = 88 - totalOcc;
            
            const detailEl = document.getElementById(`detail-${domId}`);
            if(detailEl) {
                detailEl.innerHTML = floorDetails.join(" | ");
                detailEl.style.display = hiddenCardDetails.has(domId) ? 'none' : 'block';
                const arrowEl = document.getElementById(`arrow-${domId}`);
                if(arrowEl) arrowEl.innerText = hiddenCardDetails.has(domId) ? '▶' : '▼';
            }
        });
    }
    
    function onSearch() { 
        currentPage = 1; renderTable(); 
        const kw = document.getElementById('searchInput').value.trim();
        if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
        searchDebounceTimer = setTimeout(() => { if (kw !== "") logAction("搜尋查詢", `關鍵字: "${kw}"`); }, 800);
    }

    function clearSearch() { 
        document.getElementById('searchInput').value = ''; 
        markedPos.clear();
        swipedCardIds.clear(); 
        logAction("搜尋查詢", `重置總覽`); 
        renderAll(); 
    }
    
    function sortTable(k) { 
        if(currentSort.key===k) currentSort.order*=-1; 
        else {currentSort.key=k; currentSort.order=1;} 
        renderTable(); 
    }
    
    function closeModal() { document.getElementById('itemModal').style.display = 'none'; }
    function saveDataLocal() { localStorage.setItem('offlineData_V23_7', JSON.stringify(inventory)); renderAll(); }
    function renderAll() { renderVisual(); renderTable(); }
    
    function handleFile(input) { 
        const reader = new FileReader(); 
        reader.onload = (e) => { 
            const data = XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(e.target.result), {type:'array'}).Sheets[XLSX.read(new Uint8Array(e.target.result), {type:'array'}).SheetNames[0]], {header:1}); 
            inventory = data.slice(1).map((r, i) => {
                let rawZone = String(r[1]||"").trim();
                if(rawZone === "極冷庫-left") rawZone = "極冷庫-左";
                if(rawZone === "冷藏庫-left") rawZone = "冷藏庫-左";
                return { 
                    id: Date.now() + i, 
                    zone: rawZone, 
                    floor: String(r[2]||"").trim(), 
                    pos: String(r[3]||"").trim(), 
                    fullPos: `${rawZone}${r[2]}-${r[3]}`, 
                    name: String(r[4]||""), 
                    batch: String(r[5]||""), 
                    date: r[6] ? (typeof r[6]==='number'?new Date((r[6]-25569)*86400*1000).toISOString().split('T')[0]:r[6]) : "-", 
                    note: String(r[7]||"") 
                };
            }).filter(x => x.zone); 
            swipedCardIds.clear(); 
            logAction("系統匯入", `匯入全庫資料共 ${inventory.length} 筆。`);
            saveDataLocal(); 
        }; 
        reader.readAsArrayBuffer(input.files[0]); 
    }

    function exportExcel() { 
        const ws = XLSX.utils.json_to_sheet(inventory); 
        const wb = XLSX.utils.book_new(); 
        XLSX.utils.book_append_sheet(wb, ws, "Inventory"); 
        XLSX.writeFile(wb, "Inventory.xlsx"); 
    }

    function exportActionLogs() {
        if (actionLogs.length === 0) { alert("目前尚未產生操作軌跡。"); return; }
        const wb = XLSX.utils.book_new();
        const wsLogs = XLSX.utils.json_to_sheet(actionLogs);
        wsLogs['!cols'] = [{ wch: 22 }, { wch: 14 }, { wch: 75 }];
        XLSX.utils.book_append_sheet(wb, wsLogs, "系統操作行為審計");
        const now = new Date();
        const dateStr = now.getFullYear() + (now.getMonth() + 1).toString().padStart(2, '0') + now.getDate().toString().padStart(2, '0');
        XLSX.writeFile(wb, `行動端系統日誌_${dateStr}.xlsx`);
    }
</script>
